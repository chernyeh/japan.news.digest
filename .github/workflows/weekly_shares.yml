# .github/workflows/weekly_shares.yml
# Fetches shares outstanding via yfinance batch download
# Coverage: ~228 of 440 stocks (larger liquid stocks covered)
# Runs weekly Sunday 02:00 UTC
name: J-Quants Weekly Shares

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  fetch-shares:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas requests

      - name: Write fetch script
        run: |
          cat > fetch_shares.py << 'PYEOF'
          import yfinance as yf
          import pandas as pd
          import csv
          import os
          import sys
          from datetime import datetime

          # Load codes from existing prices CSV
          codes = []
          if os.path.exists("data/jquants_prices_latest.csv"):
              with open("data/jquants_prices_latest.csv") as f:
                  for row in csv.DictReader(f):
                      c = str(row.get("Code","")).strip().zfill(4)[:4]
                      if c and c.isdigit():
                          codes.append(c)
          if not codes:
              codes = [str(i) for i in range(1300, 9999)]
          codes = list(dict.fromkeys(codes))
          print(f"Fetching shares for {len(codes)} stocks via yfinance batch...")

          # Use yf.Tickers() in batches — more reliable than individual Ticker()
          shares_map = {}
          BATCH = 50
          total = (len(codes) + BATCH - 1) // BATCH

          for i in range(0, len(codes), BATCH):
              batch_codes = codes[i:i+BATCH]
              batch_tickers = " ".join(c + ".T" for c in batch_codes)
              n = i // BATCH + 1
              if n % 10 == 0:
                  print(f"  Batch {n}/{total} — shares so far: {len(shares_map)}")
              try:
                  tobj = yf.Tickers(batch_tickers)
                  for c in batch_codes:
                      t = c + ".T"
                      try:
                          fi = tobj.tickers[t].fast_info
                          sh = getattr(fi, 'shares', None)
                          if sh and isinstance(sh, (int, float)) and sh > 0:
                              shares_map[c] = int(sh)
                      except Exception:
                          pass
              except Exception:
                  pass

          print(f"Shares fetched: {len(shares_map)} of {len(codes)} stocks")
          coverage = round(len(shares_map) / max(len(codes), 1) * 100, 1)
          print(f"Coverage: {coverage}%")

          if len(shares_map) == 0:
              print("ERROR: No shares data obtained")
              sys.exit(1)

          os.makedirs("data", exist_ok=True)
          today_str = datetime.utcnow().strftime("%Y-%m-%d")
          with open("data/jquants_shares.csv", "w", newline="", encoding="utf-8") as f:
              writer = csv.writer(f)
              writer.writerow(["Code", "SharesOutstanding", "UpdatedDate"])
              for code, shares in sorted(shares_map.items()):
                  writer.writerow([code, shares, today_str])
          print(f"Written data/jquants_shares.csv: {len(shares_map)} entries")
          PYEOF

      - name: Run fetch script
        run: python fetch_shares.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jquants_shares.csv
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update shares outstanding [skip ci]"
            git push
          fi
