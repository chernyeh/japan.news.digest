# .github/workflows/weekly_shares.yml
name: J-Quants Weekly Shares

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  fetch-shares:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Write fetch script
        run: |
          cat > fetch_shares.py << 'PYEOF'
          import requests
          import csv
          import os
          import sys
          from datetime import datetime, timedelta

          API_KEY = os.environ["JQUANTS_API_KEY"]
          BASE    = "https://api.jquants.com/v2"
          HEADERS = {"x-api-key": API_KEY}

          # Step 1: All listed companies
          r = requests.get(BASE + "/listed/info", headers=HEADERS, timeout=30)
          if r.status_code != 200:
              print("Listed info failed: " + str(r.status_code) + " " + r.text[:300])
              sys.exit(1)
          companies = r.json().get("info", [])
          print("Got " + str(len(companies)) + " listed companies")

          shares_map = {}
          for c in companies:
              code = str(c.get("Code", "")).strip()
              shares = c.get("NumberOfShares") or c.get("TotalNumberOfIssuedShares")
              if shares and code:
                  try:
                      shares_map[code] = int(float(shares))
                  except (ValueError, TypeError):
                      pass
          print("Shares from listed/info: " + str(len(shares_map)))

          # Step 2: Supplement from fins/statements
          today = datetime.utcnow()
          for days_back in range(0, 180, 30):
              date_from = (today - timedelta(days=days_back+30)).strftime("%Y-%m-%d")
              date_to   = (today - timedelta(days=days_back)).strftime("%Y-%m-%d")
              pagination_key = None
              page = 0
              while True:
                  params = {"date_from": date_from, "date_to": date_to}
                  if pagination_key:
                      params["pagination_key"] = pagination_key
                  r = requests.get(BASE + "/fins/statements",
                                   headers=HEADERS, params=params, timeout=60)
                  if r.status_code != 200:
                      break
                  data = r.json()
                  for s in data.get("statements", []):
                      code = str(s.get("LocalCode") or s.get("Code") or "").strip()
                      raw  = (s.get("NumberOfIssuedAndOutstandingSharesAtTheEndOfFiscalYearIncludingTreasuryStock")
                              or s.get("NumberOfSharesIssued"))
                      if raw and code:
                          try:
                              shares_map[code] = int(float(raw))
                          except (ValueError, TypeError):
                              pass
                  pagination_key = data.get("pagination_key")
                  page += 1
                  if not pagination_key or page > 10:
                      break
              print("Period " + date_from + " to " + date_to + ": " + str(len(shares_map)) + " total")

          os.makedirs("data", exist_ok=True)
          today_str = today.strftime("%Y-%m-%d")
          with open("data/jquants_shares.csv", "w", newline="", encoding="utf-8") as f:
              writer = csv.writer(f)
              writer.writerow(["Code", "SharesOutstanding", "UpdatedDate"])
              for code, shares in sorted(shares_map.items()):
                  writer.writerow([code, shares, today_str])
          print("Written data/jquants_shares.csv with " + str(len(shares_map)) + " entries")
          PYEOF

      - name: Run fetch script
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
        run: python fetch_shares.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jquants_shares.csv
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update shares outstanding [skip ci]"
            git push
          fi
