# .github/workflows/weekly_shares.yml
name: J-Quants Weekly Shares

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  fetch-shares:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas requests

      - name: Run diagnostic
        run: |
          python3 - << 'PYEOF'
          import requests
          from datetime import date, timedelta

          HDR = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64)"}
          today = date.today()
          print(f"Today: {today}, weekday: {today.weekday()} (0=Mon, 6=Sun)")

          # Try last 7 days regardless of weekend
          for delta in range(7):
              d = today - timedelta(days=delta)
              ds = d.strftime("%Y%m%d")
              url = (f"https://www.jpx.co.jp/markets/statistics-equities/daily/"
                     f"nlsgeu000000{ds}-att/data_{ds}.csv")
              try:
                  resp = requests.get(url, headers=HDR, timeout=20)
                  print(f"  {ds} (weekday {d.weekday()}): HTTP {resp.status_code}, {len(resp.content)} bytes")
                  if resp.status_code == 200 and len(resp.content) > 1000:
                      lines = resp.content.decode("shift_jis", errors="replace").splitlines()
                      print(f"  Rows: {len(lines)}")
                      print(f"  Header: {lines[0]}")
                      print(f"  Row 1:  {lines[1]}")
                      header = [c.strip().strip('"') for c in lines[0].split(",")]
                      row1   = [c.strip().strip('"') for c in lines[1].split(",")]
                      print(f"\nAll columns ({len(header)}):")
                      for i, col in enumerate(header):
                          val = row1[i] if i < len(row1) else "?"
                          print(f"  [{i:2d}] '{col}' = '{val}'")
                      break
              except Exception as e:
                  print(f"  {ds}: ERROR {e}")

          print("Done.")
          PYEOF
