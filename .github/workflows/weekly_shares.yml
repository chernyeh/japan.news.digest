# .github/workflows/weekly_shares.yml
name: J-Quants Weekly Shares

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  fetch-shares:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas requests

      - name: Write fetch script
        run: |
          cat > fetch_shares.py << 'PYEOF'
          import yfinance as yf
          import pandas as pd
          import csv
          import os
          import sys
          from datetime import datetime

          # ── Step 1: Get stock codes from existing prices CSV ──────────────────
          codes = []
          if os.path.exists("data/jquants_prices_latest.csv"):
              with open("data/jquants_prices_latest.csv") as f:
                  for row in csv.DictReader(f):
                      code = str(row.get("Code", "")).strip().zfill(4)[:4]
                      if code and code.isdigit():
                          codes.append(code)
              print("Loaded " + str(len(codes)) + " codes from prices CSV")
          else:
              # Fallback: generate TSE range
              codes = [str(i) for i in range(1300, 9999)]
              print("Using generated code range")

          codes = list(dict.fromkeys(codes))
          tickers = [c + ".T" for c in codes]
          print("Fetching shares for " + str(len(tickers)) + " tickers...")

          # ── Step 2: Fetch shares outstanding via yfinance in batches ──────────
          # yfinance Ticker.fast_info.shares is most reliable
          # For efficiency: batch download then extract sharesOutstanding from info
          shares_map = {}
          BATCH = 100  # smaller batch for info requests
          failed = 0

          for i in range(0, len(tickers), BATCH):
              batch = tickers[i:i+BATCH]
              n = i // BATCH + 1
              total = (len(tickers) + BATCH - 1) // BATCH
              if n % 10 == 0:
                  print("Batch " + str(n) + "/" + str(total) + " — shares so far: " + str(len(shares_map)))
              for t in batch:
                  code = t.replace(".T", "")
                  try:
                      ticker = yf.Ticker(t)
                      # fast_info is lightweight — no full info fetch needed
                      fi = ticker.fast_info
                      shares = getattr(fi, 'shares', None)
                      if shares and shares > 0:
                          shares_map[code] = int(shares)
                      else:
                          # fallback to full info
                          info = ticker.info
                          shares = (info.get("sharesOutstanding")
                                    or info.get("impliedSharesOutstanding"))
                          if shares and shares > 0:
                              shares_map[code] = int(shares)
                          else:
                              failed += 1
                  except Exception:
                      failed += 1

          print("Shares fetched: " + str(len(shares_map)) + " stocks")
          print("No data:        " + str(failed) + " stocks")

          if len(shares_map) == 0:
              print("ERROR: No shares data obtained")
              sys.exit(1)

          # ── Step 3: Write CSV ─────────────────────────────────────────────────
          os.makedirs("data", exist_ok=True)
          today_str = datetime.utcnow().strftime("%Y-%m-%d")
          with open("data/jquants_shares.csv", "w", newline="", encoding="utf-8") as f:
              writer = csv.writer(f)
              writer.writerow(["Code", "SharesOutstanding", "UpdatedDate"])
              for code, shares in sorted(shares_map.items()):
                  writer.writerow([code, shares, today_str])
          print("Written data/jquants_shares.csv with " + str(len(shares_map)) + " entries")
          PYEOF

      - name: Run fetch script
        run: python fetch_shares.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jquants_shares.csv
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update shares outstanding [skip ci]"
            git push
          fi
