name: J-Quants Weekly Shares

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  fetch-shares:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas yfinance

      - name: Run fetch script
        run: |
          # Writing the stable Yahoo Finance logic directly
          cat <<EOF > fetch_shares.py
          import yfinance as yf
          import pandas as pd
          import glob
          import os

          def update_market_caps():
              files = glob.glob('data/archive/prices_*.csv')
              if not files:
                  print("No price files found.")
                  return
              latest_file = max(files, key=os.path.getctime)
              print(f"Targeting: {latest_file}")
              df = pd.read_csv(latest_file)
              
              # Find rows needing update
              mask = df['MarketCapB'].isna() | (df['MarketCapB'] == 0)
              to_update = df[mask]['Code'].tolist()
              
              print(f"Updating {len(to_update)} stocks via Yahoo Finance...")
              for code in to_update:
                  try:
                      ticker = yf.Ticker(f"{code}.T")
                      cap = ticker.info.get('marketCap', 0) / 1_000_000_000
                      if cap > 0:
                          df.loc[df['Code'] == code, 'MarketCapB'] = round(cap, 2)
                          print(f"Success: {code} -> {round(cap, 2)}B")
                  except:
                      continue
                      
              df.to_csv(latest_file, index=False)
              print("Market caps updated successfully.")

          if __name__ == "__main__":
              update_market_caps()
          EOF
          python fetch_shares.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/archive/*.csv
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update market caps via yfinance [skip ci]"
            git push
          fi
