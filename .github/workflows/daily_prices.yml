# .github/workflows/daily_prices.yml
name: Daily Prices and Market Cap

on:
  schedule:
    - cron: '30 7 * * 1-5'   # 16:30 JST weekdays
  workflow_dispatch:

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas requests xlrd openpyxl

      - name: Write fetch script
        run: |
          cat > fetch_prices.py << 'PYEOF'
          import yfinance as yf
          import pandas as pd
          import requests
          import csv
          import io
          import os
          import sys
          from datetime import datetime, date, timedelta

          price_map = {}
          mcap_map  = {}
          shares_map = {}

          # ── Step 1: JPX shares outstanding files ──────────────────────────────
          # JPX publishes several files. The one with shares outstanding is the
          # "List of Stocks" (上場銘柄一覧) which includes 上場株式数 (listed shares)
          # Multiple URLs to try — JPX changes these periodically

          share_urls = [
              # Listed stocks with shares — main file (updated monthly)
              "https://www.jpx.co.jp/markets/statistics-equities/misc/tvdivq0000001vg2-att/data_j.xls",
              # English version attempt
              "https://www.jpx.co.jp/english/listing/stocks/list01-att/data_e.xls",
              # Alternative path
              "https://www.jpx.co.jp/markets/statistics-equities/misc/tvdivq0000001vg2-att/data_e.xls",
          ]

          for url in share_urls:
              try:
                  print(f"Trying: {url}")
                  resp = requests.get(url, headers={"User-Agent": "Mozilla/5.0"}, timeout=30)
                  print(f"  Status: {resp.status_code}, Size: {len(resp.content)} bytes")
                  if resp.status_code != 200:
                      continue

                  df = pd.read_excel(io.BytesIO(resp.content), dtype=str)
                  print(f"  Columns: {df.columns.tolist()}")
                  print(f"  Rows: {len(df)}")
                  if len(df) > 0:
                      print(f"  First row: {df.iloc[0].to_dict()}")

                  # Scan ALL columns for shares-like data
                  # JPX Japanese: 上場株式数 (listed shares), 発行済株式数 (issued shares)
                  code_col = None
                  shares_col = None
                  for col in df.columns:
                      col_s = str(col).lower()
                      col_j = str(col)
                      if code_col is None and any(k in col_s for k in ["code", "コード", "ticker"]):
                          code_col = col
                      if shares_col is None and any(k in col_j for k in
                              ["上場株式数", "発行済", "株式数", "Issued Shares",
                               "issued", "shares", "Outstanding"]):
                          shares_col = col

                  print(f"  Code col: '{code_col}', Shares col: '{shares_col}'")

                  # If no shares column found, print ALL columns with sample values
                  if shares_col is None:
                      print("  No shares column found. Full column scan:")
                      for col in df.columns:
                          sample = df[col].dropna().head(3).tolist()
                          print(f"    '{col}': {sample}")
                      continue

                  # Parse shares
                  for _, row in df.iterrows():
                      try:
                          raw_code = str(row[code_col]).strip()
                          digits = ''.join(c for c in raw_code if c.isdigit())
                          code = digits[:4] if len(digits) >= 4 else None
                          if not code:
                              continue
                          shares_str = str(row[shares_col]).replace(",", "").strip()
                          if shares_str in ("nan", "", "-"):
                              continue
                          shares = float(shares_str)
                          if shares > 0:
                              shares_map[code] = int(shares)
                      except (ValueError, TypeError):
                          continue

                  print(f"  Shares loaded: {len(shares_map)} companies")
                  if len(shares_map) > 500:
                      break  # good coverage achieved

              except Exception as e:
                  print(f"  Error: {e}")

          # ── Step 2: Fallback — cached shares CSV ───────────────────────────────
          if len(shares_map) < 100:
              print("JPX shares file failed. Using cached CSV...")
              if os.path.exists("data/jquants_shares.csv"):
                  with open("data/jquants_shares.csv") as f:
                      for row in csv.DictReader(f):
                          code = str(row.get("Code", "")).strip().zfill(4)[:4]
                          try:
                              sh = int(float(row.get("SharesOutstanding", 0) or 0))
                              if sh > 0:
                                  shares_map[code] = sh
                          except (ValueError, TypeError):
                              pass
                  print(f"Cached shares: {len(shares_map)} companies")

          # Save updated shares
          if shares_map:
              os.makedirs("data", exist_ok=True)
              ts = datetime.utcnow().strftime("%Y-%m-%d")
              with open("data/jquants_shares.csv", "w", newline="", encoding="utf-8") as f:
                  writer = csv.writer(f)
                  writer.writerow(["Code", "SharesOutstanding", "UpdatedDate"])
                  for code, shares in sorted(shares_map.items()):
                      writer.writerow([code, shares, ts])
              print(f"Saved jquants_shares.csv: {len(shares_map)} entries")

          # ── Step 3: JPX daily CSV — closing prices ─────────────────────────────
          today = date.today()
          for delta in range(5):
              d = today - timedelta(days=delta)
              if d.weekday() >= 5:
                  continue
              date_str = d.strftime("%Y%m%d")
              url = (f"https://www.jpx.co.jp/markets/statistics-equities/daily/"
                     f"nlsgeu000000{date_str}-att/data_{date_str}.csv")
              try:
                  resp = requests.get(url, headers={"User-Agent": "Mozilla/5.0"}, timeout=20)
                  if resp.status_code != 200:
                      continue
                  lines = resp.content.decode("shift_jis", errors="replace").splitlines()
                  for line in lines[1:]:
                      parts = line.split(",")
                      if len(parts) < 5:
                          continue
                      try:
                          digits = ''.join(c for c in parts[0].strip().strip('"') if c.isdigit())
                          code = digits[:4] if len(digits) >= 4 else None
                          if not code:
                              continue
                          close_str = parts[4].replace(",", "").strip().strip('"')
                          if close_str and close_str not in ("-", "－", ""):
                              price_map[code] = float(close_str)
                      except (ValueError, IndexError):
                          continue
                  if len(price_map) > 100:
                      print(f"JPX daily prices: {len(price_map)} stocks ({date_str})")
                      break
              except Exception as e:
                  print(f"JPX daily error: {e}")

          # ── Step 4: yfinance fallback for prices ───────────────────────────────
          if len(price_map) < 100:
              print("JPX daily unavailable — yfinance fallback")
              codes_fb = list(shares_map.keys()) if shares_map else [str(i) for i in range(1300,9999)]
              for i in range(0, len(codes_fb), 500):
                  batch = [c + ".T" for c in codes_fb[i:i+500]]
                  try:
                      raw = yf.download(batch, period="5d", auto_adjust=True,
                                        progress=False, group_by="ticker")
                      if not raw.empty:
                          for t in batch:
                              code = t.replace(".T", "")
                              try:
                                  closes = (raw[t]["Close"] if isinstance(raw.columns, pd.MultiIndex)
                                            else raw["Close"]).dropna()
                                  if not closes.empty:
                                      price_map[code] = float(closes.iloc[-1])
                              except Exception:
                                  pass
                  except Exception:
                      pass
              print(f"yfinance: {len(price_map)} prices")

          # ── Step 5: Compute market cap = Close × Shares / 1B ──────────────────
          for code, price in price_map.items():
              shares = shares_map.get(code)
              if shares and shares > 0 and price > 0:
                  mcap_map[code] = round((price * shares) / 1e9, 1)
          print(f"Market caps: {len(mcap_map)} stocks")

          # ── Step 6: Write CSV ──────────────────────────────────────────────────
          os.makedirs("data", exist_ok=True)
          today_str = datetime.utcnow().strftime("%Y-%m-%d")
          all_codes = sorted(set(list(price_map.keys()) + list(mcap_map.keys())))
          with open("data/jquants_prices_latest.csv", "w", newline="", encoding="utf-8") as f:
              writer = csv.writer(f)
              writer.writerow(["Code", "Date", "Close", "MarketCapB"])
              for code in all_codes:
                  writer.writerow([code, today_str,
                                   price_map.get(code, ""),
                                   mcap_map.get(code, "")])
          mc_filled = sum(1 for c in all_codes if mcap_map.get(c))
          print(f"Written: {len(all_codes)} stocks")
          print(f"MarketCapB: {mc_filled} of {len(all_codes)} ({round(mc_filled/max(len(all_codes),1)*100,1)}%)")
          PYEOF

      - name: Run fetch script
        run: python fetch_prices.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jquants_prices_latest.csv data/jquants_shares.csv
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update daily prices and market cap [skip ci]"
            git push
          fi
