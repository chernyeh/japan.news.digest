# .github/workflows/daily_prices.yml
name: Daily Prices and Market Cap

on:
  schedule:
    - cron: '30 7 * * 1-5'   # 16:30 JST weekdays
  workflow_dispatch:

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas requests

      - name: Write fetch script
        run: |
          cat > fetch_prices.py << 'PYEOF'
          import yfinance as yf
          import pandas as pd
          import requests
          import csv
          import os
          import sys
          from datetime import datetime, date, timedelta

          price_map = {}   # code (4-digit str) -> close price (float)
          mcap_map  = {}   # code (4-digit str) -> market cap in ¥B (float)

          # ── Step 1: JPX daily CSV — single request, full market coverage ──────
          # JPX publishes a daily equity stats file with prices + market cap
          # for every TSE-listed stock. Accessible from GitHub Actions.
          # URL pattern: data_{YYYYMMDD}.csv, Shift-JIS encoded
          # Market cap column is in millions of yen (百万円)

          jpx_ok = False
          today = date.today()

          for delta in range(5):
              d = today - timedelta(days=delta)
              if d.weekday() >= 5:   # skip weekends
                  continue
              date_str = d.strftime("%Y%m%d")
              url = (f"https://www.jpx.co.jp/markets/statistics-equities/daily/"
                     f"nlsgeu000000{date_str}-att/data_{date_str}.csv")
              try:
                  resp = requests.get(url, headers={"User-Agent": "Mozilla/5.0"}, timeout=20)
                  if resp.status_code != 200:
                      print(f"JPX {date_str}: HTTP {resp.status_code}")
                      continue

                  lines = resp.content.decode("shift_jis", errors="replace").splitlines()
                  if len(lines) < 2:
                      continue

                  # Print full header and first data row for debugging
                  header_raw = lines[0]
                  print(f"JPX CSV date: {date_str}")
                  print(f"JPX CSV header: {header_raw}")
                  cols = [c.strip().strip('"') for c in header_raw.split(",")]
                  print(f"JPX CSV columns ({len(cols)}): {cols}")
                  print(f"JPX first row: {lines[1]}")

                  # Identify market cap column by scanning header for keywords
                  mcap_col = None
                  for idx, col in enumerate(cols):
                      # JPX uses Japanese: 時価総額 (market cap) or similar
                      if any(kw in col for kw in ["時価総額", "MarketCap", "市場", "資本", "cap"]):
                          mcap_col = idx
                          print(f"Market cap column found: index {idx} = '{col}'")
                          break

                  if mcap_col is None:
                      # Print all columns with indices to identify manually
                      print("Market cap column NOT auto-detected. All columns:")
                      for idx, col in enumerate(cols):
                          # Sample first data row value for this column
                          first_vals = lines[1].split(",")
                          val = first_vals[idx].strip() if idx < len(first_vals) else "?"
                          print(f"  [{idx}] '{col}' = '{val}'")

                  # Parse all rows
                  for line in lines[1:]:
                      parts = line.split(",")
                      if len(parts) < 5:
                          continue
                      try:
                          # Column 0: code (may be 4 or 5 digits)
                          raw_code = parts[0].strip().strip('"')
                          # Extract first 4 digits
                          code = ''.join(c for c in raw_code if c.isdigit())[:4]
                          if len(code) != 4:
                              continue

                          # Column 4: close price
                          close_str = parts[4].replace(",", "").strip().strip('"')
                          if close_str and close_str not in ("-", "－", ""):
                              try:
                                  price_map[code] = float(close_str)
                              except ValueError:
                                  pass

                          # Market cap column (millions of yen → divide by 1000 for ¥B)
                          if mcap_col is not None and mcap_col < len(parts):
                              mc_str = parts[mcap_col].replace(",", "").strip().strip('"')
                              if mc_str and mc_str not in ("-", "－", ""):
                                  try:
                                      mc_millions = float(mc_str)
                                      if mc_millions > 0:
                                          mcap_map[code] = round(mc_millions / 1000, 1)
                                  except ValueError:
                                      pass

                      except Exception:
                          continue

                  print(f"JPX CSV parsed: {len(price_map)} prices, {len(mcap_map)} market caps")
                  jpx_ok = len(price_map) > 100
                  break

              except Exception as e:
                  print(f"JPX CSV error ({date_str}): {e}")

          # ── Step 2: yfinance fallback if JPX unavailable ──────────────────────
          if not jpx_ok:
              print("JPX CSV unavailable — falling back to yfinance for prices only")
              codes_fb = []
              if os.path.exists("data/jquants_prices_latest.csv"):
                  with open("data/jquants_prices_latest.csv") as f:
                      for row in csv.DictReader(f):
                          c = str(row.get("Code", "")).strip().zfill(4)[:4]
                          if c and c.isdigit():
                              codes_fb.append(c)
              if not codes_fb:
                  codes_fb = [str(i) for i in range(1300, 9999)]
              codes_fb = list(dict.fromkeys(codes_fb))
              tickers_fb = [c + ".T" for c in codes_fb]

              for i in range(0, len(tickers_fb), 500):
                  batch = tickers_fb[i:i+500]
                  try:
                      raw = yf.download(batch, period="5d", auto_adjust=True,
                                        progress=False, group_by="ticker")
                      if not raw.empty:
                          for t in batch:
                              code = t.replace(".T", "")
                              try:
                                  closes = (raw[t]["Close"] if isinstance(raw.columns, pd.MultiIndex)
                                            else raw["Close"]).dropna()
                                  if not closes.empty:
                                      price_map[code] = float(closes.iloc[-1])
                              except Exception:
                                  pass
                  except Exception as e:
                      print(f"yfinance batch error: {e}")
              print(f"yfinance fallback: {len(price_map)} prices")

          # ── Step 3: Write CSV ─────────────────────────────────────────────────
          os.makedirs("data", exist_ok=True)
          today_str = datetime.utcnow().strftime("%Y-%m-%d")
          all_codes = sorted(set(list(price_map.keys()) + list(mcap_map.keys())))

          with open("data/jquants_prices_latest.csv", "w", newline="", encoding="utf-8") as f:
              writer = csv.writer(f)
              writer.writerow(["Code", "Date", "Close", "MarketCapB"])
              for code in all_codes:
                  price = price_map.get(code, "")
                  mcap  = mcap_map.get(code, "")
                  if price or mcap:
                      writer.writerow([code, today_str, price, mcap])

          mc_filled = sum(1 for c in all_codes if mcap_map.get(c))
          print(f"Written: {len(all_codes)} stocks, MarketCapB filled: {mc_filled}")
          PYEOF

      - name: Run fetch script
        run: python fetch_prices.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jquants_prices_latest.csv
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update daily prices and market cap [skip ci]"
            git push
          fi
