# .github/workflows/daily_prices.yml
name: Daily Prices and Market Cap

on:
  schedule:
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas requests

      - name: Write fetch script
        run: |
          cat > fetch_prices.py << 'PYEOF'
          import yfinance as yf
          import pandas as pd
          import requests
          import csv
          import os
          import sys
          from datetime import datetime, date, timedelta

          # ── Step 1: Fetch JPX daily CSV — has code + close + market cap ───────
          # JPX publishes a full-market daily file with all columns including
          # 時価総額 (market cap). This is the most reliable source.
          price_map = {}   # code -> close price
          mcap_map  = {}   # code -> market cap in ¥B
          jpx_ok = False

          today = date.today()
          for delta in range(5):
              d = today - timedelta(days=delta)
              if d.weekday() >= 5:
                  continue
              date_str = d.strftime("%Y%m%d")
              url = (f"https://www.jpx.co.jp/markets/statistics-equities/daily/"
                     f"nlsgeu000000{date_str}-att/data_{date_str}.csv")
              try:
                  resp = requests.get(url, headers={"User-Agent": "Mozilla/5.0"}, timeout=20)
                  if resp.status_code != 200:
                      continue
                  lines = resp.content.decode("shift_jis", errors="replace").splitlines()
                  if not lines:
                      continue

                  # Print header to understand columns
                  header = lines[0]
                  print("JPX CSV header: " + header)
                  cols = [c.strip().strip('"') for c in header.split(",")]
                  print("Columns (" + str(len(cols)) + "): " + str(cols))

                  for line in lines[1:]:
                      parts = line.split(",")
                      if len(parts) < 5:
                          continue
                      try:
                          code = parts[0].strip().strip('"').zfill(4)[:4]
                          if not code.isdigit():
                              continue
                          close_str = parts[4].replace(",", "").strip()
                          if close_str:
                              price_map[code] = float(close_str)

                          # Try to find market cap column (時価総額 or MarketCap)
                          # JPX CSV typically has it around column 10-12
                          # Print first row values to identify
                          if len(lines) > 1 and line == lines[1]:
                              print("First data row values: " + str(parts[:15]))

                          # Try columns 9-14 for market cap (100M yen units usually)
                          for mc_col in range(9, min(15, len(parts))):
                              mc_str = parts[mc_col].replace(",", "").strip()
                              if mc_str and mc_str.replace(".", "").isdigit():
                                  mc_val = float(mc_str)
                                  # JPX market cap is in 100M yen (億円) — convert to B yen
                                  if mc_val > 1000:  # sanity: at least ¥100B
                                      mcap_map[code] = round(mc_val / 10, 1)
                                      break
                      except (ValueError, IndexError):
                          continue

                  if price_map:
                      print("JPX CSV: " + str(len(price_map)) + " prices, "
                            + str(len(mcap_map)) + " market caps from date " + date_str)
                      jpx_ok = True
                      break
              except Exception as e:
                  print("JPX CSV error: " + str(e))

          # ── Step 2: Fallback — yfinance batch download for prices ─────────────
          if not jpx_ok or not price_map:
              print("JPX CSV unavailable, falling back to yfinance for prices...")
              codes = []
              if os.path.exists("data/jquants_prices_latest.csv"):
                  with open("data/jquants_prices_latest.csv") as f:
                      for row in csv.DictReader(f):
                          code = str(row.get("Code", "")).strip().zfill(4)[:4]
                          if code and code.isdigit():
                              codes.append(code)
              if not codes:
                  codes = [str(i) for i in range(1300, 9999)]
              codes = list(dict.fromkeys(codes))
              tickers = [c + ".T" for c in codes]
              BATCH = 500
              for i in range(0, len(tickers), BATCH):
                  batch = tickers[i:i+BATCH]
                  try:
                      raw = yf.download(batch, period="5d", auto_adjust=True,
                                        progress=False, group_by="ticker")
                      if not raw.empty:
                          for t in batch:
                              code = t.replace(".T", "")
                              try:
                                  if isinstance(raw.columns, pd.MultiIndex):
                                      closes = raw[t]["Close"].dropna()
                                  else:
                                      closes = raw["Close"].dropna()
                                  if not closes.empty:
                                      price_map[code] = float(closes.iloc[-1])
                              except Exception:
                                  pass
                  except Exception as e:
                      print("yfinance batch error: " + str(e))
              print("yfinance prices: " + str(len(price_map)) + " stocks")

          # ── Step 3: If no market cap from JPX, compute from shares ───────────
          if not mcap_map and os.path.exists("data/jquants_shares.csv"):
              with open("data/jquants_shares.csv") as f:
                  for row in csv.DictReader(f):
                      code = str(row.get("Code", "")).strip().zfill(4)[:4]
                      try:
                          sh = int(float(row.get("SharesOutstanding", 0) or 0))
                          price = price_map.get(code)
                          if sh > 0 and price and price > 0:
                              mcap_map[code] = round((price * sh) / 1e9, 1)
                      except (ValueError, TypeError):
                          pass
              print("Computed market caps from shares: " + str(len(mcap_map)) + " stocks")
          elif not mcap_map:
              print("No market cap source available (JPX CSV empty, no shares CSV)")

          # ── Step 4: Write CSV ─────────────────────────────────────────────────
          os.makedirs("data", exist_ok=True)
          today_str = datetime.utcnow().strftime("%Y-%m-%d")
          all_codes = sorted(set(list(price_map.keys()) + list(mcap_map.keys())))

          with open("data/jquants_prices_latest.csv", "w", newline="", encoding="utf-8") as f:
              writer = csv.writer(f)
              writer.writerow(["Code", "Date", "Close", "MarketCapB"])
              for code in all_codes:
                  price = price_map.get(code, "")
                  mcap  = mcap_map.get(code, "")
                  if price or mcap:
                      writer.writerow([code, today_str, price, mcap])

          mc_filled = sum(1 for c in all_codes if mcap_map.get(c))
          print("Written jquants_prices_latest.csv: " + str(len(all_codes)) + " stocks")
          print("MarketCapB filled: " + str(mc_filled) + " of " + str(len(all_codes)))
          PYEOF

      - name: Run fetch script
        run: python fetch_prices.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jquants_prices_latest.csv
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update daily prices and market cap [skip ci]"
            git push
          fi
