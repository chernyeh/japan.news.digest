# .github/workflows/daily_prices.yml
name: Daily Prices and Market Cap

on:
  schedule:
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas requests xlrd openpyxl beautifulsoup4

      - name: Write fetch script
        run: |
          cat > fetch_prices.py << 'PYEOF'
          import yfinance as yf
          import pandas as pd
          import requests
          import csv
          import io
          import os
          import re
          from datetime import datetime, date, timedelta
          from bs4 import BeautifulSoup

          price_map  = {}
          mcap_map   = {}
          shares_map = {}
          HDR = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"}

          # ── Step 1: Scrape JPX pages to find real shares file URLs ────────────
          # Scrape multiple JPX statistics pages looking for XLS files
          # that contain shares outstanding (上場株式数 / 発行済株式数)
          pages_to_scrape = [
              "https://www.jpx.co.jp/markets/statistics-equities/misc/01.html",
              "https://www.jpx.co.jp/english/markets/statistics-equities/misc/01.html",
              "https://www.jpx.co.jp/listing/stocks/list/index.html",
              "https://www.jpx.co.jp/english/listing/stocks/list/index.html",
          ]

          found_urls = []
          for page in pages_to_scrape:
              try:
                  r = requests.get(page, headers=HDR, timeout=15)
                  print(f"Page {r.status_code}: {page}")
                  if r.status_code != 200:
                      continue
                  try:
                      html = r.content.decode("shift_jis", errors="replace")
                  except Exception:
                      html = r.text
                  soup = BeautifulSoup(html, "html.parser")
                  for a in soup.find_all("a", href=True):
                      href = a["href"]
                      text = a.get_text(strip=True)
                      if any(ext in href.lower() for ext in [".xls", ".xlsx", ".csv"]):
                          full = href if href.startswith("http") else "https://www.jpx.co.jp" + href
                          print(f"  Found: [{text}] -> {full}")
                          found_urls.append(full)
              except Exception as e:
                  print(f"  Scrape error: {e}")

          # ── Step 2: Try all found URLs + known patterns ───────────────────────
          today = date.today()
          candidate_urls = list(dict.fromkeys(found_urls))  # dedupe, preserve order

          # Add hardcoded candidates as fallback
          for months_back in range(0, 4):
              m = today.month - months_back
              y = today.year
              while m <= 0:
                  m += 12
                  y -= 1
              ym = f"{y}{m:02d}"
              candidate_urls += [
                  f"https://www.jpx.co.jp/markets/statistics-equities/misc/tvdivq0000001vg2-att/data_j_{ym}.xls",
                  f"https://www.jpx.co.jp/markets/statistics-equities/misc/nlsgeu000000{ym}-att/data_j.xls",
              ]

          print(f"\nTrying {len(candidate_urls)} candidate URLs for shares data...")
          for url in candidate_urls:
              try:
                  r = requests.get(url, headers=HDR, timeout=20)
                  if r.status_code != 200:
                      print(f"  {r.status_code}: {url.split('/')[-1]}")
                      continue
                  print(f"  200 OK ({len(r.content)} bytes): {url}")

                  # Try reading as Excel
                  try:
                      df = pd.read_excel(io.BytesIO(r.content), dtype=str)
                  except Exception:
                      try:
                          df = pd.read_excel(io.BytesIO(r.content), engine="xlrd", dtype=str)
                      except Exception as e:
                          print(f"    Cannot read as Excel: {e}")
                          continue

                  print(f"    Shape: {df.shape}, Columns: {df.columns.tolist()}")
                  if len(df) > 0:
                      print(f"    Row 0: {df.iloc[0].to_dict()}")

                  # Search for shares column
                  code_col = shares_col = None
                  for col in df.columns:
                      col_s = str(col)
                      if any(k in col_s for k in ["コード","Code","code","ticker","Ticker"]):
                          if code_col is None:
                              code_col = col
                      if any(k in col_s for k in ["上場株式数","発行済","株式数",
                                                    "Shares","shares","Issued","issued",
                                                    "Outstanding","outstanding"]):
                          if shares_col is None:
                              shares_col = col

                  if shares_col:
                      print(f"    ✓ Shares col: '{shares_col}', Code col: '{code_col}'")
                      for _, row in df.iterrows():
                          try:
                              raw = str(row[code_col]).strip()
                              digits = ''.join(c for c in raw if c.isdigit())
                              code = digits[:4] if len(digits) >= 4 else None
                              if not code:
                                  continue
                              sh_str = str(row[shares_col]).replace(",","").strip()
                              if sh_str not in ("nan","","-","None"):
                                  sh = float(sh_str)
                                  if sh > 0:
                                      shares_map[code] = int(sh)
                          except Exception:
                              continue
                      print(f"    Shares loaded: {len(shares_map)}")
                      if len(shares_map) > 500:
                          print("    ✓ Good coverage achieved!")
                          break
                  else:
                      print(f"    No shares column. All cols: {df.columns.tolist()}")

              except Exception as e:
                  print(f"  Error on {url.split('/')[-1]}: {e}")

          # ── Step 3: Last resort — cached shares ───────────────────────────────
          if len(shares_map) < 100 and os.path.exists("data/jquants_shares.csv"):
              print("Using cached jquants_shares.csv...")
              with open("data/jquants_shares.csv") as f:
                  for row in csv.DictReader(f):
                      code = str(row.get("Code","")).strip().zfill(4)[:4]
                      try:
                          sh = int(float(row.get("SharesOutstanding",0) or 0))
                          if sh > 0:
                              shares_map[code] = sh
                      except Exception:
                          pass
              print(f"Cached: {len(shares_map)} shares")

          # Save shares
          if shares_map:
              os.makedirs("data", exist_ok=True)
              ts = datetime.utcnow().strftime("%Y-%m-%d")
              with open("data/jquants_shares.csv","w",newline="",encoding="utf-8") as f:
                  w = csv.writer(f)
                  w.writerow(["Code","SharesOutstanding","UpdatedDate"])
                  for code, sh in sorted(shares_map.items()):
                      w.writerow([code, sh, ts])
              print(f"Saved shares: {len(shares_map)}")

          # ── Step 4: JPX daily CSV — prices ────────────────────────────────────
          for delta in range(5):
              d = today - timedelta(days=delta)
              if d.weekday() >= 5:
                  continue
              ds = d.strftime("%Y%m%d")
              url = (f"https://www.jpx.co.jp/markets/statistics-equities/daily/"
                     f"nlsgeu000000{ds}-att/data_{ds}.csv")
              try:
                  resp = requests.get(url, headers=HDR, timeout=20)
                  if resp.status_code != 200:
                      continue
                  lines = resp.content.decode("shift_jis", errors="replace").splitlines()
                  for line in lines[1:]:
                      parts = line.split(",")
                      if len(parts) < 5:
                          continue
                      try:
                          digits = ''.join(c for c in parts[0].strip().strip('"') if c.isdigit())
                          code = digits[:4] if len(digits) >= 4 else None
                          if not code:
                              continue
                          cs = parts[4].replace(",","").strip().strip('"')
                          if cs and cs not in ("-","－",""):
                              price_map[code] = float(cs)
                      except Exception:
                          continue
                  if len(price_map) > 100:
                      print(f"JPX prices: {len(price_map)} ({ds})")
                      break
              except Exception as e:
                  print(f"JPX daily error: {e}")

          # yfinance fallback
          if len(price_map) < 100:
              print("yfinance fallback for prices...")
              codes_fb = list(shares_map.keys()) or [str(i) for i in range(1300,9999)]
              for i in range(0, len(codes_fb), 500):
                  batch = [c+".T" for c in codes_fb[i:i+500]]
                  try:
                      raw = yf.download(batch, period="5d", auto_adjust=True,
                                        progress=False, group_by="ticker")
                      if not raw.empty:
                          for t in batch:
                              code = t.replace(".T","")
                              try:
                                  cl = (raw[t]["Close"] if isinstance(raw.columns, pd.MultiIndex)
                                        else raw["Close"]).dropna()
                                  if not cl.empty:
                                      price_map[code] = float(cl.iloc[-1])
                              except Exception:
                                  pass
                  except Exception:
                      pass
              print(f"yfinance: {len(price_map)} prices")

          # ── Step 5: Compute + write ────────────────────────────────────────────
          for code, price in price_map.items():
              sh = shares_map.get(code)
              if sh and sh > 0 and price > 0:
                  mcap_map[code] = round((price * sh) / 1e9, 1)
          print(f"Market caps: {len(mcap_map)}")

          os.makedirs("data", exist_ok=True)
          ts2 = datetime.utcnow().strftime("%Y-%m-%d")
          all_codes = sorted(set(list(price_map.keys()) + list(mcap_map.keys())))
          with open("data/jquants_prices_latest.csv","w",newline="",encoding="utf-8") as f:
              w = csv.writer(f)
              w.writerow(["Code","Date","Close","MarketCapB"])
              for code in all_codes:
                  w.writerow([code, ts2, price_map.get(code,""), mcap_map.get(code,"")])
          mc = sum(1 for c in all_codes if mcap_map.get(c))
          print(f"Written: {len(all_codes)}, MarketCapB: {mc} ({round(mc/max(len(all_codes),1)*100,1)}%)")
          PYEOF

      - name: Run fetch script
        run: python fetch_prices.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jquants_prices_latest.csv data/jquants_shares.csv
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update daily prices and market cap [skip ci]"
            git push
          fi
