# .github/workflows/daily_prices.yml
# Fetches prices via yfinance batch download (JPX CSV blocked on GitHub Actions)
# Archives daily snapshot to data/archive/ for 3M performance calculation
# Computes market cap from prices x shares (coverage ~228 larger stocks)
name: Daily Prices and Market Cap

on:
  schedule:
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas requests

      - name: Write fetch script
        run: |
          cat > fetch_prices.py << 'PYEOF'
          import yfinance as yf
          import pandas as pd
          import csv
          import os
          from datetime import datetime, date, timedelta

          price_map = {}
          mcap_map  = {}

          # ── Load shares ───────────────────────────────────────────────────────
          shares_map = {}
          if os.path.exists("data/jquants_shares.csv"):
              with open("data/jquants_shares.csv") as f:
                  for row in csv.DictReader(f):
                      code = str(row.get("Code","")).strip().zfill(4)[:4]
                      try:
                          sh = int(float(row.get("SharesOutstanding", 0) or 0))
                          if sh > 0:
                              shares_map[code] = sh
                      except Exception:
                          pass
              print(f"Shares loaded: {len(shares_map)} companies")
          else:
              print("WARNING: jquants_shares.csv not found")

          # ── Load codes ────────────────────────────────────────────────────────
          codes = list(shares_map.keys())
          if not codes and os.path.exists("data/jquants_prices_latest.csv"):
              with open("data/jquants_prices_latest.csv") as f:
                  for row in csv.DictReader(f):
                      c = str(row.get("Code","")).strip().zfill(4)[:4]
                      if c and c.isdigit():
                          codes.append(c)
          if not codes:
              codes = [str(i) for i in range(1300, 9999)]
          codes = list(dict.fromkeys(codes))
          tickers = [c + ".T" for c in codes]
          print(f"Fetching prices for {len(tickers)} tickers...")

          # ── yfinance batch download ───────────────────────────────────────────
          BATCH = 500
          total = (len(tickers) + BATCH - 1) // BATCH
          for i in range(0, len(tickers), BATCH):
              batch = tickers[i:i+BATCH]
              n = i // BATCH + 1
              try:
                  raw = yf.download(batch, period="5d", auto_adjust=True,
                                    progress=False, group_by="ticker")
                  if not raw.empty:
                      for t in batch:
                          code = t.replace(".T","")
                          try:
                              cl = (raw[t]["Close"] if isinstance(raw.columns, pd.MultiIndex)
                                    else raw["Close"]).dropna()
                              if not cl.empty:
                                  price_map[code] = float(cl.iloc[-1])
                          except Exception:
                              pass
              except Exception as e:
                  print(f"Batch {n} error: {e}")
          print(f"Prices fetched: {len(price_map)} stocks")

          # ── Compute market cap ────────────────────────────────────────────────
          for code, price in price_map.items():
              sh = shares_map.get(code)
              if sh and sh > 0 and price > 0:
                  mcap_map[code] = round((price * sh) / 1e9, 1)
          print(f"Market caps: {len(mcap_map)}")

          # ── Write CSV ─────────────────────────────────────────────────────────
          os.makedirs("data", exist_ok=True)
          today_str = datetime.utcnow().strftime("%Y-%m-%d")
          all_codes = sorted(set(list(price_map.keys()) + list(mcap_map.keys())))
          rows = [[code, today_str, price_map.get(code,""), mcap_map.get(code,"")]
                  for code in all_codes if price_map.get(code,"") or mcap_map.get(code,"")]

          with open("data/jquants_prices_latest.csv","w",newline="",encoding="utf-8") as f:
              w = csv.writer(f)
              w.writerow(["Code","Date","Close","MarketCapB"])
              w.writerows(rows)

          mc = sum(1 for c in all_codes if mcap_map.get(c))
          print(f"Written: {len(rows)} stocks, MarketCapB: {mc} ({round(mc/max(len(rows),1)*100,1)}%)")

          # ── Archive daily snapshot ────────────────────────────────────────────
          os.makedirs("data/archive", exist_ok=True)
          archive_path = f"data/archive/prices_{today_str}.csv"
          with open(archive_path,"w",newline="",encoding="utf-8") as f:
              w = csv.writer(f)
              w.writerow(["Code","Date","Close","MarketCapB"])
              w.writerows(rows)
          print(f"Archived: {archive_path}")

          # Clean archives older than 130 days
          cutoff = date.today() - timedelta(days=130)
          for fname in os.listdir("data/archive"):
              if fname.startswith("prices_") and fname.endswith(".csv"):
                  try:
                      fdate = date.fromisoformat(fname[7:-4])
                      if fdate < cutoff:
                          os.remove(f"data/archive/{fname}")
                  except Exception:
                      pass
          PYEOF

      - name: Run fetch script
        run: python fetch_prices.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jquants_prices_latest.csv data/archive/
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update daily prices and market cap [skip ci]"
            git push
          fi
