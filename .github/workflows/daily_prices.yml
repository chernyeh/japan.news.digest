# .github/workflows/daily_prices.yml
name: J-Quants Daily Prices

on:
  schedule:
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Write fetch script
        run: |
          cat > fetch_prices.py << 'PYEOF'
          import requests
          import csv
          import os
          import sys
          from datetime import datetime, timedelta

          API_KEY = os.environ["JQUANTS_API_KEY"]
          BASE    = "https://api.jquants.com/v2"
          HEADERS = {"x-api-key": API_KEY}

          # Find latest trading date
          today = datetime.utcnow()
          if today.hour < 8:
              today -= timedelta(days=1)
          while today.weekday() >= 5:
              today -= timedelta(days=1)
          date_str = today.strftime("%Y%m%d")
          print("Fetching prices for " + date_str)

          # V2 endpoint: /equities/bars/daily
          all_quotes = []
          pagination_key = None
          page = 0
          while True:
              params = {"date": date_str}
              if pagination_key:
                  params["pagination_key"] = pagination_key
              r = requests.get(BASE + "/equities/bars/daily",
                               headers=HEADERS, params=params, timeout=60)
              if r.status_code != 200:
                  print("Price fetch failed: " + str(r.status_code) + " " + r.text[:300])
                  sys.exit(1)
              data = r.json()
              # V2 returns "bars" not "daily_quotes"
              quotes = data.get("bars", data.get("daily_quotes", []))
              all_quotes.extend(quotes)
              pagination_key = data.get("pagination_key")
              page += 1
              print("Page " + str(page) + ": " + str(len(quotes)) + " quotes (total: " + str(len(all_quotes)) + ")")
              if not pagination_key:
                  break

          if not all_quotes:
              print("No quotes for " + date_str + " - likely a holiday, keeping existing file")
              sys.exit(0)

          print("Total: " + str(len(all_quotes)) + " quotes")
          if all_quotes:
              print("Sample keys: " + str(list(all_quotes[0].keys())))

          os.makedirs("data", exist_ok=True)
          with open("data/jquants_prices_latest.csv", "w", newline="", encoding="utf-8") as f:
              # Write all fields from first record as header
              if all_quotes:
                  fieldnames = list(all_quotes[0].keys())
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for q in all_quotes:
                      writer.writerow(q)
          print("Written: data/jquants_prices_latest.csv")
          PYEOF

      - name: Run fetch script
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
        run: python fetch_prices.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jquants_prices_latest.csv
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update daily prices [skip ci]"
            git push
          fi
