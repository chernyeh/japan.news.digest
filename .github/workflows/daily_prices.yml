# .github/workflows/daily_prices.yml
name: Daily Prices and Market Cap

on:
  schedule:
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas requests

      - name: Write fetch script
        run: |
          cat > fetch_prices.py << 'PYEOF'
          import yfinance as yf
          import pandas as pd
          import requests
          import csv
          import os
          from datetime import datetime, date, timedelta

          price_map = {}
          mcap_map  = {}
          HDR = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64)"}

          # ── Step 1: Load shares from weekly CSV ───────────────────────────────
          shares_map = {}
          if os.path.exists("data/jquants_shares.csv"):
              with open("data/jquants_shares.csv") as f:
                  for row in csv.DictReader(f):
                      code = str(row.get("Code","")).strip().zfill(4)[:4]
                      try:
                          sh = int(float(row.get("SharesOutstanding", 0) or 0))
                          if sh > 0:
                              shares_map[code] = sh
                      except Exception:
                          pass
              print(f"Shares loaded: {len(shares_map)} companies")
          else:
              print("WARNING: jquants_shares.csv not found — run weekly_shares first")

          # ── Step 2: JPX daily CSV — closing prices ────────────────────────────
          today = date.today()
          for delta in range(5):
              d = today - timedelta(days=delta)
              if d.weekday() >= 5:
                  continue
              ds = d.strftime("%Y%m%d")
              url = (f"https://www.jpx.co.jp/markets/statistics-equities/daily/"
                     f"nlsgeu000000{ds}-att/data_{ds}.csv")
              try:
                  resp = requests.get(url, headers=HDR, timeout=20)
                  if resp.status_code != 200:
                      continue
                  lines = resp.content.decode("shift_jis", errors="replace").splitlines()
                  for line in lines[1:]:
                      parts = line.split(",")
                      if len(parts) < 5:
                          continue
                      try:
                          digits = ''.join(c for c in parts[0].strip().strip('"') if c.isdigit())
                          code = digits[:4] if len(digits) >= 4 else None
                          if not code:
                              continue
                          cs = parts[4].replace(",","").strip().strip('"')
                          if cs and cs not in ("-","－",""):
                              price_map[code] = float(cs)
                      except Exception:
                          continue
                  if len(price_map) > 100:
                      print(f"JPX prices: {len(price_map)} stocks ({ds})")
                      break
              except Exception as e:
                  print(f"JPX error: {e}")

          # yfinance fallback
          if len(price_map) < 100:
              print("JPX unavailable — yfinance fallback")
              codes_fb = list(shares_map.keys()) or [str(i) for i in range(1300,9999)]
              for i in range(0, len(codes_fb), 500):
                  batch = [c+".T" for c in codes_fb[i:i+500]]
                  try:
                      raw = yf.download(batch, period="5d", auto_adjust=True,
                                        progress=False, group_by="ticker")
                      if not raw.empty:
                          for t in batch:
                              code = t.replace(".T","")
                              try:
                                  cl = (raw[t]["Close"] if isinstance(raw.columns, pd.MultiIndex)
                                        else raw["Close"]).dropna()
                                  if not cl.empty:
                                      price_map[code] = float(cl.iloc[-1])
                              except Exception:
                                  pass
                  except Exception:
                      pass
              print(f"yfinance: {len(price_map)} prices")

          # ── Step 3: Compute market cap = Close × Shares / 1B ─────────────────
          for code, price in price_map.items():
              sh = shares_map.get(code)
              if sh and sh > 0 and price > 0:
                  mcap_map[code] = round((price * sh) / 1e9, 1)
          print(f"Market caps: {len(mcap_map)}")

          # ── Step 4: Write CSV ──────────────────────────────────────────────────
          os.makedirs("data", exist_ok=True)
          ts = datetime.utcnow().strftime("%Y-%m-%d")
          all_codes = sorted(set(list(price_map.keys()) + list(mcap_map.keys())))
          with open("data/jquants_prices_latest.csv","w",newline="",encoding="utf-8") as f:
              w = csv.writer(f)
              w.writerow(["Code","Date","Close","MarketCapB"])
              for code in all_codes:
                  w.writerow([code, ts, price_map.get(code,""), mcap_map.get(code,"")])
          mc = sum(1 for c in all_codes if mcap_map.get(c))
          print(f"Written: {len(all_codes)} stocks")
          print(f"MarketCapB: {mc} of {len(all_codes)} ({round(mc/max(len(all_codes),1)*100,1)}%)")
          PYEOF

      - name: Run fetch script
        run: python fetch_prices.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jquants_prices_latest.csv
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update daily prices and market cap [skip ci]"
            git push
          fi
