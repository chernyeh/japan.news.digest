# .github/workflows/daily_prices.yml
# Fetches prices via yfinance batch download (JPX CSV blocked on GitHub Actions)
# Archives daily snapshot to data/archive/ for 3M performance calculation
# Computes market cap from prices x shares (coverage ~228 larger stocks)
name: Daily Prices and Market Cap

on:
  schedule:
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas requests

      - name: Write fetch script
        run: |
          cat > fetch_prices.py << 'PYEOF'
          import yfinance as yf
          import pandas as pd
          import csv
          import os
          from datetime import datetime, date, timedelta

          price_map = {}
          mcap_map  = {}

          # ── Load shares ───────────────────────────────────────────────────────
          shares_map = {}
          if os.path.exists("data/jquants_shares.csv"):
              with open("data/jquants_shares.csv") as f:
                  for row in csv.DictReader(f):
                      code = str(row.get("Code","")).strip().zfill(4)[:4]
                      try:
                          sh = int(float(row.get("SharesOutstanding", 0) or 0))
                          if sh > 0:
                              shares_map[code] = sh
                      except Exception:
                          pass
              print(f"Shares loaded: {len(shares_map)} companies")
          else:
              print("WARNING: jquants_shares.csv not found")

          # ── Load codes ────────────────────────────────────────────────────────
          # Always fetch all TSE codes so 3M perf covers the full earnings calendar
          # (3172 unique companies vs only 228 in shares_map).
          # Market cap is still computed only for companies in shares_map.
          import random
          # Always fetch TOPIX ETFs first so they're available for the benchmark
          TOPIX_MUST = ["1308", "1306"]
          codes = [str(i).zfill(4) for i in range(1300, 9999)]
          codes = [c for c in dict.fromkeys(codes) if c not in TOPIX_MUST]
          random.shuffle(codes)
          codes = TOPIX_MUST + codes
          tickers = [c + ".T" for c in codes]
          print(f"Fetching prices for {len(tickers)} tickers...")

          # ── yfinance batch download ───────────────────────────────────────────
          BATCH = 500
          total = (len(tickers) + BATCH - 1) // BATCH
          for i in range(0, len(tickers), BATCH):
              batch = tickers[i:i+BATCH]
              n = i // BATCH + 1
              try:
                  raw = yf.download(batch, period="5d", auto_adjust=True,
                                    progress=False, group_by="ticker")
                  if not raw.empty:
                      for t in batch:
                          code = t.replace(".T","")
                          try:
                              cl = (raw[t]["Close"] if isinstance(raw.columns, pd.MultiIndex)
                                    else raw["Close"]).dropna()
                              if not cl.empty:
                                  price_map[code] = float(cl.iloc[-1])
                          except Exception:
                              pass
              except Exception as e:
                  print(f"Batch {n} error: {e}")
          print(f"Prices fetched: {len(price_map)} stocks")

          # ── Compute market cap ────────────────────────────────────────────────
          for code, price in price_map.items():
              sh = shares_map.get(code)
              if sh and sh > 0 and price > 0:
                  mcap_map[code] = round((price * sh) / 1e9, 1)
          print(f"Market caps: {len(mcap_map)}")

          # ── Write CSV ─────────────────────────────────────────────────────────
          os.makedirs("data", exist_ok=True)
          today_str = datetime.utcnow().strftime("%Y-%m-%d")
          all_codes = sorted(set(list(price_map.keys()) + list(mcap_map.keys())))
          rows = [[code, today_str, price_map.get(code,""), mcap_map.get(code,"")]
                  for code in all_codes if price_map.get(code,"") or mcap_map.get(code,"")]

          with open("data/jquants_prices_latest.csv","w",newline="",encoding="utf-8") as f:
              w = csv.writer(f)
              w.writerow(["Code","Date","Close","MarketCapB"])
              w.writerows(rows)

          mc = sum(1 for c in all_codes if mcap_map.get(c))
          print(f"Written: {len(rows)} stocks, MarketCapB: {mc} ({round(mc/max(len(rows),1)*100,1)}%)")

          # ── Archive daily snapshot ────────────────────────────────────────────
          os.makedirs("data/archive", exist_ok=True)
          archive_path = f"data/archive/prices_{today_str}.csv"
          with open(archive_path,"w",newline="",encoding="utf-8") as f:
              w = csv.writer(f)
              w.writerow(["Code","Date","Close","MarketCapB"])
              w.writerows(rows)
          print(f"Archived: {archive_path}")

          # ── Backfill missing historical snapshots ─────────────────────────────
          # Ensures 3M/6M/12M windows are always covered so the compute script
          # can derive TOPIX benchmarks from archives instead of relying on yfinance.
          LOOKBACKS = {"3M": (91, 14), "6M": (181, 21), "12M": (365, 28)}
          today = date.today()
          existing_dates = set()
          for fname in os.listdir("data/archive"):
              if fname.startswith("prices_") and fname.endswith(".csv"):
                  try: existing_dates.add(date.fromisoformat(fname[7:-4]))
                  except Exception: pass

          backfill_targets = []
          for period, (days_ago, tolerance) in LOOKBACKS.items():
              target = today - timedelta(days=days_ago)
              covered = any(abs((d - target).days) <= tolerance for d in existing_dates)
              if not covered:
                  backfill_targets.append((period, target))
                  print(f"Backfill needed: {period} target {target}")

          for period, target in backfill_targets:
              start_str = (target - timedelta(days=5)).isoformat()
              end_str   = (target + timedelta(days=1)).isoformat()
              print(f"Backfilling {period} ({target})...")
              hist_prices = {}
              for i in range(0, len(tickers), BATCH):
                  batch = tickers[i:i+BATCH]
                  n = i // BATCH + 1
                  try:
                      raw = yf.download(batch, start=start_str, end=end_str,
                                        auto_adjust=True, progress=False, group_by="ticker")
                      if raw.empty:
                          continue
                      for t in batch:
                          code = t.replace(".T","")
                          try:
                              cl = (raw[t]["Close"] if isinstance(raw.columns, pd.MultiIndex)
                                    else raw["Close"]).dropna()
                              if not cl.empty:
                                  hist_prices[code] = float(cl.iloc[-1])
                          except Exception:
                              pass
                  except Exception as e:
                      print(f"  Backfill batch {n} error: {e}")
              if hist_prices:
                  target_str = target.isoformat()
                  bf_path = f"data/archive/prices_{target_str}.csv"
                  with open(bf_path, "w", newline="", encoding="utf-8") as f:
                      w = csv.writer(f)
                      w.writerow(["Code","Date","Close","MarketCapB"])
                      for code, price in sorted(hist_prices.items()):
                          w.writerow([code, target_str, price, ""])
                  print(f"  Backfilled {bf_path} ({len(hist_prices)} stocks)")
              else:
                  print(f"  Backfill {period}: no prices returned (market closed?)")

          # ── Delete archives older than 380 days ───────────────────────────────
          # 380-day buffer keeps 12M lookback (365d) with room for weekends/holidays
          cutoff = date.today() - timedelta(days=380)
          removed = 0
          for fname in os.listdir("data/archive"):
              if fname.startswith("prices_") and fname.endswith(".csv"):
                  try:
                      fdate = date.fromisoformat(fname[7:-4])
                      if fdate < cutoff:
                          os.remove(f"data/archive/{fname}")
                          removed += 1
                  except Exception:
                      pass
          if removed:
              print(f"Cleaned {removed} archives older than {cutoff}")
          PYEOF

      - name: Run fetch script
        run: python fetch_prices.py

      - name: Write 3M/6M/12M perf script
        run: |
          cat > compute_3m_perf.py << 'PYEOF'
          import yfinance as yf
          import pandas as pd
          import csv
          import os
          import sys
          from datetime import datetime, date, timedelta

          def geo_relative(r_stock, r_bench):
              if r_stock is None or r_bench is None:
                  return None
              return round(((1 + r_stock/100) / (1 + r_bench/100) - 1) * 100, 1)

          today = date.today()
          archive_dir = "data/archive"
          # (days_ago, tolerance_days) for each period
          PERIODS = {"3M": (91, 14), "6M": (181, 21), "12M": (365, 28)}
          TOPIX_CODES = ["1308", "1306"]  # 1308.T preferred (no unadjusted split issue)

          # ── Load today's prices ───────────────────────────────────────────────
          today_prices = {}
          if os.path.exists("data/jquants_prices_latest.csv"):
              with open("data/jquants_prices_latest.csv") as f:
                  for row in csv.DictReader(f):
                      code = str(row.get("Code","")).strip().zfill(4)[:4]
                      try:
                          p = float(row.get("Close","") or 0)
                          if p > 0:
                              today_prices[code] = p
                      except Exception:
                          pass
              print(f"Today prices: {len(today_prices)} stocks")
          else:
              print("ERROR: jquants_prices_latest.csv not found")
              sys.exit(1)

          # ── Find best archive for each period ─────────────────────────────────
          def find_best_archive(target_date, tolerance):
              best_file, best_delta = None, 9999
              if not os.path.exists(archive_dir):
                  return None, None
              for fname in os.listdir(archive_dir):
                  if fname.startswith("prices_") and fname.endswith(".csv"):
                      try:
                          fdate = date.fromisoformat(fname[7:-4])
                          delta = abs((fdate - target_date).days)
                          if delta < best_delta:
                              best_delta = delta
                              best_file = fname
                      except Exception:
                          pass
              if best_file and best_delta <= tolerance:
                  return best_file, best_delta
              return None, None

          def load_archive(fname):
              prices = {}
              with open(os.path.join(archive_dir, fname)) as f:
                  for row in csv.DictReader(f):
                      code = str(row.get("Code","")).strip().zfill(4)[:4]
                      try:
                          p = float(row.get("Close","") or 0)
                          if p > 0:
                              prices[code] = p
                      except Exception:
                          pass
              return prices

          past_prices = {}   # {period: {code: past_price}}
          topix_returns = {} # {period: float}
          archives_used = {}

          for period, (target_days, tolerance) in PERIODS.items():
              target_date = today - timedelta(days=target_days)
              fname, delta = find_best_archive(target_date, tolerance)
              if fname:
                  pp = load_archive(fname)
                  past_prices[period] = pp
                  archives_used[period] = (fname, delta)
                  print(f"{period}: archive {fname} ({delta}d from target, {len(pp)} stocks)")
                  for tc in TOPIX_CODES:
                      t_today = today_prices.get(tc)
                      t_past = pp.get(tc)
                      if t_today and t_past and t_past > 0:
                          cand = round((t_today / t_past - 1) * 100, 2)
                          if abs(cand) <= 80:
                              topix_returns[period] = cand
                              print(f"  TOPIX {period} from archive ({tc}): {cand}%")
                              break
              else:
                  print(f"{period}: no archive within {tolerance}d — will use yfinance")

          # ── yfinance fallback for any period without archive data ──────────────
          missing = [p for p in PERIODS if p not in past_prices or p not in topix_returns]

          if missing:
              print(f"yfinance fallback for: {missing}")
              # TOPIX benchmark — one 13mo download covers all periods
              for ticker in ["1308.T", "1306.T", "^TOPX"]:
                  try:
                      raw = yf.download(ticker, period="13mo", auto_adjust=True, progress=False)
                      if raw.empty:
                          continue
                      if isinstance(raw.columns, pd.MultiIndex):
                          raw.columns = raw.columns.get_level_values(-1)
                      closes = raw["Close"].dropna()
                      if isinstance(closes, pd.DataFrame):
                          closes = closes.iloc[:, 0]
                      if len(closes) >= 30:
                          for period in missing:
                              if period in topix_returns:
                                  continue
                              idx = max(0, len(closes) - PERIODS[period][0])
                              p_then = float(closes.iloc[idx])
                              p_now  = float(closes.iloc[-1])
                              if p_then > 0:
                                  cand = round((p_now / p_then - 1) * 100, 2)
                                  if abs(cand) <= 80:
                                      topix_returns[period] = cand
                                      print(f"  TOPIX {period} via {ticker}: {cand}%")
                          break
                  except Exception as e:
                      print(f"TOPIX {ticker}: {e}")

              # Stooq fallback — more reliable from CI for Japanese index data
              missing_topix = [p for p in missing if p not in topix_returns]
              if missing_topix:
                  try:
                      import requests as _req
                      _end = date.today()
                      _start = _end - timedelta(days=400)
                      _url = (f"https://stooq.com/q/d/l/?s=^tpx"
                              f"&d1={_start:%Y%m%d}&d2={_end:%Y%m%d}&i=d")
                      _r = _req.get(_url, timeout=12)
                      _stooq_rows = []
                      for _line in _r.text.strip().splitlines()[1:]:
                          _parts = _line.split(",")
                          if len(_parts) >= 5:
                              try: _stooq_rows.append((_parts[0], float(_parts[4])))
                              except: pass
                      _stooq_rows.sort()
                      if len(_stooq_rows) >= 30:
                          _p_now = _stooq_rows[-1][1]
                          for period in missing_topix:
                              _idx = max(0, len(_stooq_rows) - PERIODS[period][0])
                              _p_then = _stooq_rows[_idx][1]
                              if _p_then > 0:
                                  _cand = round((_p_now / _p_then - 1) * 100, 2)
                                  if abs(_cand) <= 80:
                                      topix_returns[period] = _cand
                                      print(f"  TOPIX {period} via stooq: {_cand}%")
                  except Exception as _se:
                      print(f"Stooq TOPIX fallback: {_se}")

              # Stock prices for periods still lacking archive data
              periods_need_prices = [p for p in missing if p not in past_prices]
              if periods_need_prices:
                  codes = list(today_prices.keys())
                  tickers = [c + ".T" for c in codes]
                  BATCH = 500
                  total = (len(tickers) + BATCH - 1) // BATCH
                  for i in range(0, len(tickers), BATCH):
                      batch = tickers[i:i+BATCH]
                      n = i // BATCH + 1
                      if n % 5 == 0:
                          print(f"  Batch {n}/{total}")
                      try:
                          raw = yf.download(batch, period="13mo", auto_adjust=True,
                                            progress=False, group_by="ticker")
                          if raw.empty:
                              continue
                          for t in batch:
                              code = t.replace(".T","")
                              for period in periods_need_prices:
                                  if period not in past_prices:
                                      past_prices[period] = {}
                                  if code in past_prices[period]:
                                      continue
                                  try:
                                      if isinstance(raw.columns, pd.MultiIndex):
                                          closes = raw[t]["Close"].dropna()
                                      else:
                                          closes = raw["Close"].dropna()
                                      if len(closes) >= 20:
                                          idx = max(0, len(closes) - PERIODS[period][0])
                                          past_prices[period][code] = float(closes.iloc[idx])
                                  except Exception:
                                      pass
                      except Exception as e:
                          print(f"Batch {n} error: {e}")
                  for p in periods_need_prices:
                      print(f"  yfinance {p}: {len(past_prices.get(p,{}))} stocks")

          print(f"TOPIX returns: {topix_returns}")

          # ── Compute returns for every stock across all periods ─────────────────
          results = {}
          for code, price_now in today_prices.items():
              row_data = {}
              for period in ["3M", "6M", "12M"]:
                  if period not in topix_returns or period not in past_prices:
                      continue
                  price_then = past_prices[period].get(code)
                  if price_then and price_then > 0 and price_now > 0:
                      r_stock = (price_now / price_then - 1) * 100
                      rel = geo_relative(r_stock, topix_returns[period])
                      if rel is not None:
                          row_data[period] = rel
              if row_data:
                  results[code] = row_data

          print(f"Computed: {len(results)} stocks")

          # ── Write CSV ─────────────────────────────────────────────────────────
          os.makedirs("data", exist_ok=True)
          today_str = today.strftime("%Y-%m-%d")
          tr3  = round(topix_returns["3M"],  2) if "3M"  in topix_returns else ""
          tr6  = round(topix_returns["6M"],  2) if "6M"  in topix_returns else ""
          tr12 = round(topix_returns["12M"], 2) if "12M" in topix_returns else ""
          with open("data/jquants_3m_perf.csv","w",newline="",encoding="utf-8") as f:
              w = csv.writer(f)
              w.writerow(["Code","VsTopix3M","VsTopix6M","VsTopix12M",
                          "TopixReturn3M","TopixReturn6M","TopixReturn12M","ComputedDate"])
              for code, perfs in sorted(results.items()):
                  w.writerow([code,
                              perfs.get("3M",""), perfs.get("6M",""), perfs.get("12M",""),
                              tr3, tr6, tr12, today_str])
          print(f"Written data/jquants_3m_perf.csv: {len(results)} entries")
          for p, (fn, d) in archives_used.items():
              print(f"  {p}: archive {fn} ({d}d from target)")
          for p in PERIODS:
              if p not in archives_used:
                  print(f"  {p}: yfinance fallback")
          PYEOF

      - name: Run 3M/6M/12M perf script
        run: python compute_3m_perf.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jquants_prices_latest.csv data/archive/ data/jquants_3m_perf.csv
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update daily prices, market cap, and 3M perf [skip ci]"
            git push
          fi
