# .github/workflows/daily_prices.yml
name: Daily Prices and Market Cap

on:
  schedule:
    - cron: '30 7 * * 1-5'   # 16:30 JST weekdays
  workflow_dispatch:

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas requests

      - name: Write fetch script
        run: |
          cat > fetch_prices.py << 'PYEOF'
          import yfinance as yf
          import pandas as pd
          import csv
          import os
          import sys
          from datetime import datetime

          # ── Step 1: Load company codes ────────────────────────────────────────
          codes = []

          # Try loading from existing prices CSV first
          if os.path.exists("data/jquants_prices_latest.csv"):
              with open("data/jquants_prices_latest.csv") as f:
                  for row in csv.DictReader(f):
                      code = str(row.get("Code", "")).strip().zfill(4)[:4]
                      if code and code.isdigit():
                          codes.append(code)
              print("Loaded " + str(len(codes)) + " codes from existing CSV")

          # Fallback: generate TSE code range
          if not codes:
              codes = [str(i) for i in range(1300, 9999)]
              print("Using generated code range: " + str(len(codes)) + " codes")

          codes = list(dict.fromkeys(codes))
          tickers = [c + ".T" for c in codes]
          print("Total tickers: " + str(len(tickers)))

          # ── Step 2: Load shares outstanding from weekly_shares.csv ───────────
          shares_map = {}
          if os.path.exists("data/jquants_shares.csv"):
              with open("data/jquants_shares.csv") as f:
                  for row in csv.DictReader(f):
                      code = str(row.get("Code", "")).strip().zfill(4)[:4]
                      try:
                          sh = int(float(row.get("SharesOutstanding", 0) or 0))
                          if sh > 0:
                              shares_map[code] = sh
                      except (ValueError, TypeError):
                          pass
              print("Loaded shares for " + str(len(shares_map)) + " companies")
          else:
              print("WARNING: jquants_shares.csv not found - market cap will be empty")
              print("Run the weekly_shares workflow first")

          # ── Step 3: Batch download prices via yfinance ────────────────────────
          price_map = {}
          BATCH = 500

          for i in range(0, len(tickers), BATCH):
              batch = tickers[i:i+BATCH]
              batch_num = i // BATCH + 1
              total_batches = (len(tickers) + BATCH - 1) // BATCH
              print("Batch " + str(batch_num) + "/" + str(total_batches) + " (" + str(len(batch)) + " tickers)...")
              try:
                  if len(batch) == 1:
                      raw = yf.download(batch[0], period="5d", auto_adjust=True, progress=False)
                      if not raw.empty:
                          if isinstance(raw.columns, pd.MultiIndex):
                              raw.columns = raw.columns.get_level_values(0)
                          closes = raw["Close"].dropna()
                          if not closes.empty:
                              price_map[batch[0].replace(".T", "")] = float(closes.iloc[-1])
                  else:
                      raw = yf.download(batch, period="5d", auto_adjust=True,
                                        progress=False, group_by="ticker")
                      if not raw.empty:
                          for t in batch:
                              code = t.replace(".T", "")
                              try:
                                  if isinstance(raw.columns, pd.MultiIndex):
                                      closes = raw[t]["Close"].dropna()
                                  else:
                                      closes = raw["Close"].dropna()
                                  if not closes.empty:
                                      price_map[code] = float(closes.iloc[-1])
                              except Exception:
                                  pass
              except Exception as e:
                  print("  Batch " + str(batch_num) + " error: " + str(e))

          print("Prices fetched for " + str(len(price_map)) + " stocks")

          # ── Step 4: Compute market cap = Close x Shares / 1B ─────────────────
          mcap_map = {}
          for code, price in price_map.items():
              shares = shares_map.get(code)
              if shares and shares > 0 and price > 0:
                  mcap_map[code] = round((price * shares) / 1e9, 1)

          print("Market caps computed for " + str(len(mcap_map)) + " stocks")
          if len(mcap_map) == 0 and len(shares_map) == 0:
              print("No shares data available - run weekly_shares workflow first")

          # ── Step 5: Write CSV ─────────────────────────────────────────────────
          os.makedirs("data", exist_ok=True)
          today_str = datetime.utcnow().strftime("%Y-%m-%d")
          all_codes = sorted(set(list(price_map.keys()) + list(mcap_map.keys())))

          with open("data/jquants_prices_latest.csv", "w", newline="", encoding="utf-8") as f:
              writer = csv.writer(f)
              writer.writerow(["Code", "Date", "Close", "MarketCapB"])
              for code in all_codes:
                  price = price_map.get(code, "")
                  mcap  = mcap_map.get(code, "")
                  if price or mcap:
                      writer.writerow([code, today_str, price, mcap])

          print("Written data/jquants_prices_latest.csv with " + str(len(all_codes)) + " entries")
          mc_filled = sum(1 for c in all_codes if mcap_map.get(c))
          print("MarketCapB filled for " + str(mc_filled) + " of " + str(len(all_codes)) + " stocks")
          PYEOF

      - name: Run fetch script
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
        run: python fetch_prices.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jquants_prices_latest.csv
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update daily prices and market cap [skip ci]"
            git push
          fi
