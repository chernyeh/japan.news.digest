# .github/workflows/weekly_3m_perf.yml
name: Weekly 3M vs TOPIX Performance

on:
  schedule:
    - cron: '0 3 * * 0'   # Sunday 03:00 UTC
  workflow_dispatch:

jobs:
  compute-3m-perf:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas requests

      - name: Write compute script
        run: |
          cat > compute_3m_perf.py << 'PYEOF'
          import yfinance as yf
          import pandas as pd
          import requests
          import csv
          import os
          import sys
          from datetime import datetime, date, timedelta

          # ── Helper: geometric relative return ────────────────────────────────
          # Geometric return is more accurate than arithmetic (r_stock - r_bench)
          # Formula: ((1 + r_stock) / (1 + r_bench) - 1) * 100
          def geo_relative(r_stock, r_bench):
              if r_stock is None or r_bench is None:
                  return None
              return round(((1 + r_stock/100) / (1 + r_bench/100) - 1) * 100, 1)

          # ── Strategy: use archived price files (zero API calls) ───────────────
          # daily_prices.yml saves data/archive/prices_YYYY-MM-DD.csv every day.
          # After 90+ days of archives we read two files and compare.
          # Until then, fall back to yfinance monthly data.

          today = date.today()
          target_past = today - timedelta(days=91)

          # Load today's prices
          today_prices = {}
          if os.path.exists("data/jquants_prices_latest.csv"):
              with open("data/jquants_prices_latest.csv") as f:
                  for row in csv.DictReader(f):
                      code = str(row.get("Code","")).strip().zfill(4)[:4]
                      try:
                          p = float(row.get("Close","") or 0)
                          if p > 0:
                              today_prices[code] = p
                      except Exception:
                          pass
              print(f"Today prices: {len(today_prices)} stocks")
          else:
              print("ERROR: jquants_prices_latest.csv not found")
              sys.exit(1)

          # Find best available archive file closest to 91 days ago
          past_prices = {}
          archive_dir = "data/archive"
          archive_used = None

          if os.path.exists(archive_dir):
              archive_files = sorted([
                  f for f in os.listdir(archive_dir)
                  if f.startswith("prices_") and f.endswith(".csv")
              ])
              print(f"Archive files available: {len(archive_files)}")

              # Find the file closest to target_past date
              best_file = None
              best_delta = timedelta(days=999)
              for fname in archive_files:
                  try:
                      fdate = date.fromisoformat(fname.replace("prices_","").replace(".csv",""))
                      delta = abs((fdate - target_past).days)
                      if delta < best_delta:
                          best_delta = delta
                          best_file = fname
                  except Exception:
                      pass

              if best_file and best_delta.days <= 14:  # within 2 weeks of target
                  fpath = os.path.join(archive_dir, best_file)
                  with open(fpath) as f:
                      for row in csv.DictReader(f):
                          code = str(row.get("Code","")).strip().zfill(4)[:4]
                          try:
                              p = float(row.get("Close","") or 0)
                              if p > 0:
                                  past_prices[code] = p
                          except Exception:
                              pass
                  archive_used = best_file
                  print(f"Past prices from archive: {len(past_prices)} stocks ({best_file}, {best_delta.days} days ago)")
              else:
                  if best_file:
                      print(f"Best archive is {best_delta.days} days from target — too far, using yfinance")
                  else:
                      print("No suitable archive found — using yfinance fallback")

          # ── yfinance fallback (monthly intervals = much lighter request) ──────
          # Uses interval="1mo" which fetches only ~4 data points per stock
          # instead of ~88 daily points — 20x less data, far less likely to block
          topix_3m = None

          if not past_prices:
              print("Fetching via yfinance (monthly intervals)...")

              # TOPIX benchmark — 1306.T (NEXT FUNDS TOPIX ETF)
              for ticker in ["1306.T", "^TOPX", "^N300", "1308.T"]:
                  try:
                      raw = yf.download(ticker, period="4mo", interval="1mo",
                                        auto_adjust=True, progress=False)
                      if raw.empty:
                          continue
                      if isinstance(raw.columns, pd.MultiIndex):
                          raw.columns = raw.columns.get_level_values(0)
                      closes = raw["Close"].dropna()
                      if len(closes) >= 2:
                          topix_3m = round(float((closes.iloc[-1] / closes.iloc[0] - 1) * 100), 2)
                          print(f"TOPIX via {ticker}: {topix_3m}%")
                          break
                  except Exception as e:
                      print(f"{ticker}: {e}")

              if topix_3m is None:
                  print("ERROR: Cannot get TOPIX benchmark")
                  sys.exit(1)

              # Fetch stocks via monthly intervals — much lighter
              codes = list(today_prices.keys())
              tickers = [c + ".T" for c in codes]
              BATCH = 500
              total = (len(tickers) + BATCH - 1) // BATCH

              for i in range(0, len(tickers), BATCH):
                  batch = tickers[i:i+BATCH]
                  n = i // BATCH + 1
                  if n % 5 == 0:
                      print(f"  Batch {n}/{total}, past prices so far: {len(past_prices)}")
                  try:
                      raw = yf.download(batch, period="4mo", interval="1mo",
                                        auto_adjust=True, progress=False,
                                        group_by="ticker")
                      if raw.empty:
                          continue
                      for t in batch:
                          code = t.replace(".T","")
                          try:
                              if isinstance(raw.columns, pd.MultiIndex):
                                  closes = raw[t]["Close"].dropna()
                              else:
                                  closes = raw["Close"].dropna()
                              if len(closes) >= 2:
                                  # Use first monthly close as "3 months ago" price
                                  past_prices[code] = float(closes.iloc[0])
                          except Exception:
                              pass
                  except Exception as e:
                      print(f"  Batch {n} error: {e}")

              print(f"yfinance monthly: {len(past_prices)} past prices")

          # ── Compute 3M return vs TOPIX for each stock ─────────────────────────
          results = {}

          # Get TOPIX return from archives if available
          if archive_used and topix_3m is None:
              # Read TOPIX proxy (1306) from archives
              topix_today = today_prices.get("1306")
              topix_past  = past_prices.get("1306")
              if topix_today and topix_past and topix_past > 0:
                  topix_3m = round((topix_today / topix_past - 1) * 100, 2)
                  print(f"TOPIX (1306.T) from archives: {topix_3m}%")

          if topix_3m is None:
              print("ERROR: No TOPIX benchmark available")
              sys.exit(1)

          print(f"TOPIX 3M return: {topix_3m}%")

          for code, price_now in today_prices.items():
              price_then = past_prices.get(code)
              if price_then and price_then > 0 and price_now > 0:
                  r_stock = (price_now / price_then - 1) * 100
                  rel = geo_relative(r_stock, topix_3m)
                  if rel is not None:
                      results[code] = rel

          print(f"Computed: {len(results)} stocks")

          # ── Write CSV ──────────────────────────────────────────────────────────
          os.makedirs("data", exist_ok=True)
          today_str = today.strftime("%Y-%m-%d")
          with open("data/jquants_3m_perf.csv","w",newline="",encoding="utf-8") as f:
              w = csv.writer(f)
              w.writerow(["Code","VsTopix3M","TopixReturn3M","ComputedDate"])
              for code, perf in sorted(results.items()):
                  w.writerow([code, perf, round(topix_3m, 2), today_str])
          print(f"Written data/jquants_3m_perf.csv: {len(results)} entries")
          if archive_used:
              print(f"Source: archive comparison ({archive_used} vs today)")
          else:
              print(f"Source: yfinance monthly intervals")
          PYEOF

      - name: Run compute script
        run: python3 compute_3m_perf.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jquants_3m_perf.csv
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update 3M performance [skip ci]"
            git push
          fi
