# .github/workflows/weekly_3m_perf.yml
name: Weekly 3M vs TOPIX Performance

on:
  schedule:
    - cron: '0 3 * * 0'   # Sunday 03:00 UTC
  workflow_dispatch:

jobs:
  compute-3m-perf:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas requests

      - name: Write 3M/6M/12M compute script
        run: |
          cat > compute_3m_perf.py << 'PYEOF'
          import yfinance as yf
          import pandas as pd
          import csv
          import os
          import sys
          from datetime import datetime, date, timedelta

          def geo_relative(r_stock, r_bench):
              if r_stock is None or r_bench is None:
                  return None
              return round(((1 + r_stock/100) / (1 + r_bench/100) - 1) * 100, 1)

          today = date.today()
          archive_dir = "data/archive"
          PERIODS = {"3M": (91, 14), "6M": (181, 21), "12M": (365, 28)}
          TOPIX_CODES = ["1308", "1306"]

          today_prices = {}
          if os.path.exists("data/jquants_prices_latest.csv"):
              with open("data/jquants_prices_latest.csv") as f:
                  for row in csv.DictReader(f):
                      code = str(row.get("Code","")).strip().zfill(4)[:4]
                      try:
                          p = float(row.get("Close","") or 0)
                          if p > 0:
                              today_prices[code] = p
                      except Exception:
                          pass
              print(f"Today prices: {len(today_prices)} stocks")
          else:
              print("ERROR: jquants_prices_latest.csv not found")
              sys.exit(1)

          def find_best_archive(target_date, tolerance):
              best_file, best_delta = None, 9999
              if not os.path.exists(archive_dir):
                  return None, None
              for fname in os.listdir(archive_dir):
                  if fname.startswith("prices_") and fname.endswith(".csv"):
                      try:
                          fdate = date.fromisoformat(fname[7:-4])
                          delta = abs((fdate - target_date).days)
                          if delta < best_delta:
                              best_delta = delta
                              best_file = fname
                      except Exception:
                          pass
              if best_file and best_delta <= tolerance:
                  return best_file, best_delta
              return None, None

          def load_archive(fname):
              prices = {}
              with open(os.path.join(archive_dir, fname)) as f:
                  for row in csv.DictReader(f):
                      code = str(row.get("Code","")).strip().zfill(4)[:4]
                      try:
                          p = float(row.get("Close","") or 0)
                          if p > 0:
                              prices[code] = p
                      except Exception:
                          pass
              return prices

          past_prices = {}
          topix_returns = {}
          archives_used = {}

          for period, (target_days, tolerance) in PERIODS.items():
              target_date = today - timedelta(days=target_days)
              fname, delta = find_best_archive(target_date, tolerance)
              if fname:
                  pp = load_archive(fname)
                  past_prices[period] = pp
                  archives_used[period] = (fname, delta)
                  print(f"{period}: archive {fname} ({delta}d from target, {len(pp)} stocks)")
                  for tc in TOPIX_CODES:
                      t_today = today_prices.get(tc)
                      t_past = pp.get(tc)
                      if t_today and t_past and t_past > 0:
                          cand = round((t_today / t_past - 1) * 100, 2)
                          if abs(cand) <= 80:
                              topix_returns[period] = cand
                              print(f"  TOPIX {period} from archive ({tc}): {cand}%")
                              break
              else:
                  print(f"{period}: no archive within {tolerance}d — will use yfinance")

          missing = [p for p in PERIODS if p not in past_prices or p not in topix_returns]

          if missing:
              print(f"yfinance fallback for: {missing}")
              for ticker in ["1308.T", "1306.T", "^TOPX"]:
                  try:
                      raw = yf.download(ticker, period="13mo", auto_adjust=True, progress=False)
                      if raw.empty:
                          continue
                      if isinstance(raw.columns, pd.MultiIndex):
                          raw.columns = raw.columns.get_level_values(-1)
                      closes = raw["Close"].dropna()
                      if isinstance(closes, pd.DataFrame):
                          closes = closes.iloc[:, 0]
                      if len(closes) >= 30:
                          for period in missing:
                              if period in topix_returns:
                                  continue
                              idx = max(0, len(closes) - PERIODS[period][0])
                              p_then = float(closes.iloc[idx])
                              p_now  = float(closes.iloc[-1])
                              if p_then > 0:
                                  cand = round((p_now / p_then - 1) * 100, 2)
                                  if abs(cand) <= 80:
                                      topix_returns[period] = cand
                                      print(f"  TOPIX {period} via {ticker}: {cand}%")
                          break
                  except Exception as e:
                      print(f"TOPIX {ticker}: {e}")

              # Stooq fallback — more reliable from CI for Japanese index data
              missing_topix = [p for p in missing if p not in topix_returns]
              if missing_topix:
                  try:
                      import requests as _req
                      _end = date.today()
                      _start = _end - timedelta(days=400)
                      _url = (f"https://stooq.com/q/d/l/?s=^tpx"
                              f"&d1={_start:%Y%m%d}&d2={_end:%Y%m%d}&i=d")
                      _r = _req.get(_url, timeout=12)
                      _stooq_rows = []
                      for _line in _r.text.strip().splitlines()[1:]:
                          _parts = _line.split(",")
                          if len(_parts) >= 5:
                              try: _stooq_rows.append((_parts[0], float(_parts[4])))
                              except: pass
                      _stooq_rows.sort()
                      if len(_stooq_rows) >= 30:
                          _p_now = _stooq_rows[-1][1]
                          for period in missing_topix:
                              _idx = max(0, len(_stooq_rows) - PERIODS[period][0])
                              _p_then = _stooq_rows[_idx][1]
                              if _p_then > 0:
                                  _cand = round((_p_now / _p_then - 1) * 100, 2)
                                  if abs(_cand) <= 80:
                                      topix_returns[period] = _cand
                                      print(f"  TOPIX {period} via stooq: {_cand}%")
                  except Exception as _se:
                      print(f"Stooq TOPIX fallback: {_se}")

              periods_need_prices = [p for p in missing if p not in past_prices]
              if periods_need_prices:
                  codes = list(today_prices.keys())
                  tickers = [c + ".T" for c in codes]
                  BATCH = 500
                  total = (len(tickers) + BATCH - 1) // BATCH
                  for i in range(0, len(tickers), BATCH):
                      batch = tickers[i:i+BATCH]
                      n = i // BATCH + 1
                      if n % 5 == 0:
                          print(f"  Batch {n}/{total}")
                      try:
                          raw = yf.download(batch, period="13mo", auto_adjust=True,
                                            progress=False, group_by="ticker")
                          if raw.empty:
                              continue
                          for t in batch:
                              code = t.replace(".T","")
                              for period in periods_need_prices:
                                  if period not in past_prices:
                                      past_prices[period] = {}
                                  if code in past_prices[period]:
                                      continue
                                  try:
                                      if isinstance(raw.columns, pd.MultiIndex):
                                          closes = raw[t]["Close"].dropna()
                                      else:
                                          closes = raw["Close"].dropna()
                                      if len(closes) >= 20:
                                          idx = max(0, len(closes) - PERIODS[period][0])
                                          past_prices[period][code] = float(closes.iloc[idx])
                                  except Exception:
                                      pass
                      except Exception as e:
                          print(f"Batch {n} error: {e}")
                  for p in periods_need_prices:
                      print(f"  yfinance {p}: {len(past_prices.get(p,{}))} stocks")

          print(f"TOPIX returns: {topix_returns}")

          results = {}
          for code, price_now in today_prices.items():
              row_data = {}
              for period in ["3M", "6M", "12M"]:
                  if period not in topix_returns or period not in past_prices:
                      continue
                  price_then = past_prices[period].get(code)
                  if price_then and price_then > 0 and price_now > 0:
                      r_stock = (price_now / price_then - 1) * 100
                      rel = geo_relative(r_stock, topix_returns[period])
                      if rel is not None:
                          row_data[period] = rel
              if row_data:
                  results[code] = row_data

          print(f"Computed: {len(results)} stocks")

          os.makedirs("data", exist_ok=True)
          today_str = today.strftime("%Y-%m-%d")
          tr3  = round(topix_returns["3M"],  2) if "3M"  in topix_returns else ""
          tr6  = round(topix_returns["6M"],  2) if "6M"  in topix_returns else ""
          tr12 = round(topix_returns["12M"], 2) if "12M" in topix_returns else ""
          with open("data/jquants_3m_perf.csv","w",newline="",encoding="utf-8") as f:
              w = csv.writer(f)
              w.writerow(["Code","VsTopix3M","VsTopix6M","VsTopix12M",
                          "TopixReturn3M","TopixReturn6M","TopixReturn12M","ComputedDate"])
              for code, perfs in sorted(results.items()):
                  w.writerow([code,
                              perfs.get("3M",""), perfs.get("6M",""), perfs.get("12M",""),
                              tr3, tr6, tr12, today_str])
          print(f"Written data/jquants_3m_perf.csv: {len(results)} entries")
          for p, (fn, d) in archives_used.items():
              print(f"  {p}: archive {fn} ({d}d from target)")
          for p in PERIODS:
              if p not in archives_used:
                  print(f"  {p}: yfinance fallback")
          PYEOF

      - name: Run compute script
        run: python3 compute_3m_perf.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jquants_3m_perf.csv
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update 3M/6M/12M performance [skip ci]"
            git push
          fi
