# .github/workflows/weekly_3m_perf.yml
name: Weekly 3M vs TOPIX Performance

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  compute-3m-perf:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas requests

      - name: Write compute script
        run: |
          cat > compute_3m_perf.py << 'PYEOF'
          import yfinance as yf
          import pandas as pd
          import csv
          import os
          import sys
          from datetime import datetime

          def fetch_closes(ticker):
              """Download closes for a single ticker, handling MultiIndex safely."""
              try:
                  data = yf.download(ticker, period="4mo", auto_adjust=True,
                                     progress=False)
                  if data.empty:
                      return None
                  # yfinance sometimes returns MultiIndex columns for a single ticker
                  if isinstance(data.columns, pd.MultiIndex):
                      data.columns = data.columns.get_level_values(0)
                  closes = data["Close"].dropna()
                  # Flatten any remaining Series-of-Series issues
                  if hasattr(closes.iloc[0], '__iter__'):
                      closes = closes.apply(lambda x: float(x.iloc[0]) if hasattr(x, 'iloc') else float(x))
                  return closes
              except Exception as e:
                  print(ticker + ": fetch error - " + str(e))
                  return None

          def get_3m_return(closes):
              """Compute 3-month return from a closes Series."""
              if closes is None or len(closes) < 2:
                  return None
              try:
                  cutoff = closes.index[-1] - pd.Timedelta(days=91)
                  old = closes[closes.index <= cutoff]
                  if len(old) == 0:
                      return None
                  last  = float(closes.iloc[-1])
                  first = float(old.iloc[-1])
                  if first == 0:
                      return None
                  return (last / first - 1) * 100
              except Exception as e:
                  print("get_3m_return error: " + str(e))
                  return None

          # ── Step 1: TOPIX benchmark ───────────────────────────────────────────
          print("Fetching TOPIX benchmark...")
          topix_3m = None
          # 1306.T = NEXT FUNDS TOPIX ETF (most liquid TOPIX proxy on TSE)
          for ticker in ["1306.T", "^TOPX", "^N300", "1308.T", "0168.T"]:
              closes = fetch_closes(ticker)
              ret = get_3m_return(closes)
              if ret is not None:
                  topix_3m = ret
                  print("TOPIX benchmark via " + ticker + ": " + str(round(topix_3m, 2)) + "%")
                  break
              else:
                  print(ticker + ": no usable data")

          if topix_3m is None:
              print("Could not get TOPIX benchmark — aborting")
              sys.exit(1)

          # ── Step 2: Load codes ────────────────────────────────────────────────
          codes = []
          if os.path.exists("data/jquants_prices_latest.csv"):
              with open("data/jquants_prices_latest.csv") as f:
                  for row in csv.DictReader(f):
                      code = str(row.get("Code", "")).strip().zfill(4)[:4]
                      if code and code.isdigit():
                          codes.append(code)
              print("Loaded " + str(len(codes)) + " codes")
          else:
              print("No prices CSV — run Daily Prices workflow first")
              sys.exit(1)

          tickers = [c + ".T" for c in codes]
          print("Computing 3M return for " + str(len(tickers)) + " stocks...")

          # ── Step 3: Batch download ────────────────────────────────────────────
          results = {}
          BATCH = 500

          for i in range(0, len(tickers), BATCH):
              batch = tickers[i:i+BATCH]
              n = i // BATCH + 1
              total = (len(tickers) + BATCH - 1) // BATCH
              print("Batch " + str(n) + "/" + str(total) + "...")
              try:
                  raw = yf.download(batch, period="4mo", auto_adjust=True,
                                    progress=False, group_by="ticker")
                  if raw.empty:
                      continue

                  for t in batch:
                      code = t.replace(".T", "")
                      try:
                          # Handle MultiIndex safely
                          if isinstance(raw.columns, pd.MultiIndex):
                              if t not in raw.columns.get_level_values(0):
                                  continue
                              closes = raw[t]["Close"].dropna()
                          else:
                              closes = raw["Close"].dropna()

                          # Flatten if needed
                          if len(closes) > 0 and hasattr(closes.iloc[0], '__iter__'):
                              closes = closes.apply(lambda x: float(x.iloc[0]) if hasattr(x, 'iloc') else float(x))

                          ret = get_3m_return(closes)
                          if ret is not None:
                              results[code] = round(ret - topix_3m, 1)
                      except Exception:
                          pass

              except Exception as e:
                  print("Batch " + str(n) + " error: " + str(e))

          print("Computed " + str(len(results)) + " stocks")

          # ── Step 4: Write CSV ─────────────────────────────────────────────────
          os.makedirs("data", exist_ok=True)
          today_str = datetime.utcnow().strftime("%Y-%m-%d")
          with open("data/jquants_3m_perf.csv", "w", newline="", encoding="utf-8") as f:
              writer = csv.writer(f)
              writer.writerow(["Code", "VsTopix3M", "TopixReturn3M", "ComputedDate"])
              for code, perf in sorted(results.items()):
                  writer.writerow([code, perf, round(topix_3m, 2), today_str])
          print("Written data/jquants_3m_perf.csv")
          PYEOF

      - name: Run compute script
        run: python3 compute_3m_perf.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jquants_3m_perf.csv
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update 3M performance [skip ci]"
            git push
          fi
