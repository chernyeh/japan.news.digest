# .github/workflows/weekly_3m_perf.yml
name: Weekly 3M vs TOPIX Performance

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  compute-3m-perf:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas requests

      - name: Write compute script
        run: |
          cat > compute_3m_perf.py << 'PYEOF'
          import yfinance as yf
          import pandas as pd
          import csv
          import os
          import sys
          from datetime import datetime

          def get_3m_return(closes):
              if closes is None or len(closes) < 2:
                  return None
              cutoff = closes.index[-1] - pd.Timedelta(days=91)
              old = closes[closes.index <= cutoff]
              if len(old) == 0:
                  return None
              return float((closes.iloc[-1] / old.iloc[-1] - 1) * 100)

          # ── Step 1: Get TOPIX 3M return — try multiple tickers ───────────────
          print("Fetching TOPIX benchmark...")
          topix_3m = None
          topix_tickers = ["1306.T", "^TOPX", "^N300", "0168.T"]
          # 1306.T = TOPIX ETF (NEXT FUNDS TOPIX), very liquid and reliable
          # 0168.T = iShares TOPIX ETF
          for ticker in topix_tickers:
              try:
                  data = yf.download(ticker, period="4mo", auto_adjust=True, progress=False)
                  if not data.empty:
                      closes = data["Close"].dropna()
                      topix_3m = get_3m_return(closes)
                      if topix_3m is not None:
                          print("TOPIX benchmark via " + ticker + ": " + str(round(topix_3m, 2)) + "%")
                          break
                      else:
                          print(ticker + ": data found but insufficient history")
                  else:
                      print(ticker + ": no data")
              except Exception as e:
                  print(ticker + ": error - " + str(e))

          if topix_3m is None:
              print("Could not get TOPIX benchmark from any ticker - aborting")
              sys.exit(1)

          # ── Step 2: Load codes from existing prices CSV ───────────────────────
          codes = []
          if os.path.exists("data/jquants_prices_latest.csv"):
              with open("data/jquants_prices_latest.csv") as f:
                  for row in csv.DictReader(f):
                      code = str(row.get("Code", "")).strip().zfill(4)[:4]
                      if code and code.isdigit():
                          codes.append(code)
              print("Loaded " + str(len(codes)) + " codes from prices CSV")
          else:
              print("No prices CSV found — run Daily Prices workflow first")
              sys.exit(1)

          tickers = [c + ".T" for c in codes]
          print("Computing 3M return for " + str(len(tickers)) + " stocks...")

          # ── Step 3: Batch download and compute ────────────────────────────────
          results = {}
          BATCH = 500

          for i in range(0, len(tickers), BATCH):
              batch = tickers[i:i+BATCH]
              n = i // BATCH + 1
              total = (len(tickers) + BATCH - 1) // BATCH
              print("Batch " + str(n) + "/" + str(total) + " (" + str(len(batch)) + " tickers)...")
              try:
                  if len(batch) == 1:
                      raw = yf.download(batch[0], period="4mo", auto_adjust=True, progress=False)
                      price_map = {batch[0]: raw} if not raw.empty else {}
                  else:
                      raw = yf.download(batch, period="4mo", auto_adjust=True,
                                        progress=False, group_by="ticker")
                      price_map = {}
                      if not raw.empty:
                          for t in batch:
                              try:
                                  df = raw[t].dropna(subset=["Close"])
                                  if not df.empty:
                                      price_map[t] = df
                              except Exception:
                                  pass

                  for t in batch:
                      code = t.replace(".T", "")
                      try:
                          if t not in price_map:
                              continue
                          ret = get_3m_return(price_map[t]["Close"].dropna())
                          if ret is not None:
                              results[code] = round(ret - topix_3m, 1)
                      except Exception:
                          pass

              except Exception as e:
                  print("  Batch " + str(n) + " error: " + str(e))

          print("Computed " + str(len(results)) + " stocks")

          # ── Step 4: Write CSV ─────────────────────────────────────────────────
          os.makedirs("data", exist_ok=True)
          today_str = datetime.utcnow().strftime("%Y-%m-%d")
          with open("data/jquants_3m_perf.csv", "w", newline="", encoding="utf-8") as f:
              writer = csv.writer(f)
              writer.writerow(["Code", "VsTopix3M", "TopixReturn3M", "ComputedDate"])
              for code, perf in sorted(results.items()):
                  writer.writerow([code, perf, round(topix_3m, 2), today_str])
          print("Written data/jquants_3m_perf.csv")
          PYEOF

      - name: Run compute script
        run: python3 compute_3m_perf.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jquants_3m_perf.csv
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update 3M performance [skip ci]"
            git push
          fi
